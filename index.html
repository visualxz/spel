<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PRINCE & NATHAN vs BAJSMONSTRET</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#7ec8ff; font-family:'Comic Sans MS','Chalkboard SE',sans-serif; touch-action:none; }
  #wrap { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; transform-origin:top left; }
  /* i stående läge på mobil: rotera hela spelet så det fyller skärmen liggande */
  body.portrait #wrap {
    position:fixed;
    top:0; left:100%;
    width:100vh; height:100vw;
    transform:rotate(90deg);
  }
  canvas#game { display:block; width:100%; height:100%; object-fit:contain; }
  .btn { position:absolute; bottom:18px; width:84px; height:84px; border-radius:50%; border:4px solid #fff;
    background:rgba(255,255,255,.35); font-size:38px; display:flex; align-items:center; justify-content:center;
    user-select:none; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.3); z-index:5; }
  .btn:active { background:rgba(255,255,255,.65); transform:scale(.93); }
  #left { left:18px; } #right { left:118px; }
  #jump { right:18px; width:104px; height:104px; font-size:26px; background:rgba(255,90,90,.55); font-weight:bold; }
  #shoot { right:134px; bottom:30px; width:84px; height:84px; font-size:34px; background:rgba(90,150,255,.55); }
  #musicBtn { position:absolute; top:10px; right:14px; width:54px; height:54px; border-radius:50%; border:3px solid #fff;
    background:rgba(255,255,255,.4); font-size:26px; display:flex; align-items:center; justify-content:center;
    user-select:none; cursor:pointer; z-index:7; }
  #musicBtn:active { transform:scale(.92); }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#7ec8ff,#b6f0ff); z-index:10; text-align:center; padding:16px; overflow:auto; }
  #overlay h1 { font-size:min(7vw,40px); color:#fff; text-shadow:3px 3px 0 #ff8a3d, 6px 6px 0 rgba(0,0,0,.15); margin-bottom:4px; }
  #overlay p { font-size:min(4.2vw,19px); color:#2d5a8a; margin:4px 0 8px; }
  .row { display:flex; gap:14px; margin:6px 0; flex-wrap:wrap; justify-content:center; }
  .char,.lvl { border-radius:18px; border:4px solid #fff; cursor:pointer; font-family:inherit; font-weight:bold; color:#2d5a8a; }
  .char { width:140px; padding:10px 8px; font-size:17px; background:rgba(255,255,255,.65); }
  .char canvas { display:block; margin:0 auto 4px; }
  .lvl { padding:12px 20px; font-size:18px; background:rgba(255,255,255,.65); }
  .char.sel,.lvl.sel { border-color:#ffb53d; background:#fff3c7; transform:scale(1.06); box-shadow:0 4px 12px rgba(0,0,0,.15); }
  .label { font-size:14px; color:#1b3a5a; font-weight:bold; margin-top:8px; }
  #startBtn { font-size:min(7vw,30px); padding:13px 40px; border-radius:50px; border:none; cursor:pointer; margin-top:12px;
    background:linear-gradient(180deg,#ffd83d,#ffb53d); color:#7a4a00; font-weight:bold; font-family:inherit;
    box-shadow:0 6px 0 #d98e1e; animation:bounce 1s infinite; }
  #startBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #d98e1e; }
  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  .hidden { display:none !important; }
  #hud { position:absolute; top:12px; left:14px; font-size:24px; color:#fff; text-shadow:2px 2px 3px rgba(0,0,0,.35); z-index:4; font-weight:bold; }
  #msg { position:absolute; top:16%; width:100%; text-align:center; font-size:min(7vw,36px); color:#fff;
    text-shadow:3px 3px 0 rgba(0,0,0,.25); z-index:6; pointer-events:none; opacity:0; transition:opacity .3s; font-weight:bold; padding:0 10px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="500"></canvas>
  <div id="hud"></div>
  <div id="msg"></div>
  <div id="musicBtn" class="hidden">🎵</div>
  <div id="left" class="btn hidden">◀</div>
  <div id="right" class="btn hidden">▶</div>
  <div id="jump" class="btn hidden">HOPPA!</div>
  <div id="shoot" class="btn hidden">🥏</div>
  <div id="overlay">
    <h1>PRINCE &amp; NATHAN<br>vs BAJSMONSTRET</h1>
    <div class="label">VÄLJ HJÄLTE</div>
    <div class="row" id="chars">
      <button class="char sel" data-c="cap"><canvas width="100" height="130"></canvas>PRINCE</button>
      <button class="char" data-c="nathan"><canvas width="100" height="130"></canvas>NATHAN</button>
    </div>
    <div class="label">VÄLJ BANA</div>
    <div class="row" id="levels">
      <button class="lvl sel" data-l="1">🌳 Bana 1<br><span style="font-size:13px;font-weight:normal">Bajsmonstret</span></button>
      <button class="lvl" data-l="2">🛝 Bana 2<br><span style="font-size:13px;font-weight:normal">Plikta lekpark</span></button>
    </div>
    <p style="font-size:min(3.6vw,15px)">⬅️➡️ spring &nbsp;|&nbsp; mellanslag hoppa &nbsp;|&nbsp; F / 🥏 kasta frisbee</p>
    <button id="startBtn">▶ STARTA!</button>
  </div>
</div>
<script>
(() => {
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if (typeof r === 'number') r = Math.min(r, w/2, h/2);
    this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r); this.closePath(); return this;
  };
}
const cv = document.getElementById('game'), ctx = cv.getContext('2d');
const W = 900, H = 500, GROUND = 430;
const overlay = document.getElementById('overlay'), startBtn = document.getElementById('startBtn');
const hud = document.getElementById('hud'), msgEl = document.getElementById('msg');
const btnL = document.getElementById('left'), btnR = document.getElementById('right'), btnJ = document.getElementById('jump');
const btnS = document.getElementById('shoot'), musicBtn = document.getElementById('musicBtn');

// ---------- karaktärer ----------
const CHARS = {
  cap:    { name:'PRINCE', skin:'#eebd8a', shirt:'#3fbf5a', arms:'#3fbf5a', pants:'#3a6bd6', shoes:'#e0342f', hair:'blond', cap:true,  spider:false },
  nathan: { name:'NATHAN', skin:'#5c3317', shirt:'#e0342f', arms:'#e0342f', pants:'#2456c4', shoes:'#1a1a1a', hair:'black', cap:false, spider:true }
};
let heroKey = 'cap', levelNum = 1;

function renderFigure(g, c, run, arm, detail) {
  run = run||0; arm = arm||0;
  g.strokeStyle = c.pants; g.lineWidth = 9; g.lineCap = 'round';
  g.beginPath(); g.moveTo(-7,-26); g.lineTo(-9+run*0.6,-2); g.stroke();
  g.beginPath(); g.moveTo(7,-26); g.lineTo(9-run*0.6,-2); g.stroke();
  g.fillStyle = c.shoes;
  g.beginPath(); g.ellipse(-9+run*0.6,-2,8,5,0,0,7); g.fill();
  g.beginPath(); g.ellipse(9-run*0.6,-2,8,5,0,0,7); g.fill();
  g.fillStyle = c.shirt;
  g.beginPath(); g.roundRect(-14,-48,28,26,8); g.fill();
  if (detail) { // mjuk skuggning på tröjan
    g.fillStyle='rgba(0,0,0,0.12)'; g.beginPath(); g.roundRect(2,-48,12,26,8); g.fill();
    g.fillStyle='rgba(255,255,255,0.18)'; g.beginPath(); g.roundRect(-14,-48,8,26,8); g.fill();
  }
  if (c.spider) {
    g.strokeStyle = '#1a1a1a'; g.lineWidth = 1.2;
    g.beginPath(); g.moveTo(0,-48); g.lineTo(0,-22); g.stroke();
    g.beginPath(); g.moveTo(-14,-40); g.lineTo(14,-40); g.stroke();
    g.beginPath(); g.moveTo(-14,-31); g.lineTo(14,-31); g.stroke();
    g.beginPath(); g.moveTo(-12,-48); g.lineTo(10,-22); g.stroke();
    g.beginPath(); g.moveTo(12,-48); g.lineTo(-10,-22); g.stroke();
    g.fillStyle = '#0d0d0d';
    g.beginPath(); g.ellipse(0,-34,4,6,0,0,7); g.fill();
    g.beginPath(); g.arc(0,-41,2.8,0,7); g.fill();
    g.strokeStyle = '#0d0d0d'; g.lineWidth = 1.4;
    [[-4,-38,-10,-43],[4,-38,10,-43],[-4,-35,-11,-35],[4,-35,11,-35],[-4,-31,-10,-27],[4,-31,10,-27]].forEach(s=>{
      g.beginPath(); g.moveTo(s[0],s[1]); g.lineTo(s[2],s[3]); g.stroke(); });
  } else {
    g.fillStyle = '#ffd83d';
    g.beginPath();
    g.moveTo(-7,-30); g.lineTo(-7,-38); g.lineTo(-3.5,-33); g.lineTo(0,-39);
    g.lineTo(3.5,-33); g.lineTo(7,-38); g.lineTo(7,-30); g.closePath(); g.fill();
  }
  g.strokeStyle = c.arms; g.lineWidth = 8; g.lineCap = 'round';
  g.beginPath(); g.moveTo(-13,-44); g.lineTo(-20-arm*0.3,-32+arm*0.4); g.stroke();
  g.beginPath(); g.moveTo(13,-44); g.lineTo(20+arm*0.3,-32-arm*0.4); g.stroke();
  // händer
  g.fillStyle = c.skin;
  g.beginPath(); g.arc(-20-arm*0.3,-32+arm*0.4,3.5,0,7); g.fill();
  g.beginPath(); g.arc(20+arm*0.3,-32-arm*0.4,3.5,0,7); g.fill();
  // huvud
  g.fillStyle = c.skin;
  g.beginPath(); g.arc(0,-60,15,0,7); g.fill();
  if (detail) { // ansiktsskuggning för rundare känsla
    g.fillStyle='rgba(0,0,0,0.1)'; g.beginPath(); g.arc(4,-58,13,-0.3,1.6); g.fill();
  }
  // öron
  g.fillStyle = c.skin;
  g.beginPath(); g.arc(-14,-58,3.5,0,7); g.fill();
  g.beginPath(); g.arc(14,-58,3.5,0,7); g.fill();
  if (c.hair === 'blond') {
    g.fillStyle = '#ffe066';
    if (c.cap) {
      [[-15,-62],[-13,-67],[15,-62],[13,-67],[-16,-58]].forEach(cu=>{ g.beginPath(); g.arc(cu[0],cu[1],5.5,0,7); g.fill(); });
      g.fillStyle = '#e0342f';
      g.beginPath(); g.arc(0,-66,15,Math.PI,0); g.fill();
      g.beginPath(); g.roundRect(6,-70,18,6,3); g.fill();
      g.fillStyle = '#b8241f';
      g.beginPath(); g.roundRect(-15,-68,30,4,2); g.fill();
      if(detail){ g.fillStyle='rgba(255,255,255,0.25)'; g.beginPath(); g.arc(-5,-70,6,Math.PI,0); g.fill(); }
    } else {
      [[-13,-70],[-6,-75],[2,-76],[10,-73],[15,-66],[-16,-63],[6,-78],[-2,-79]].forEach(cu=>{ g.beginPath(); g.arc(cu[0],cu[1],6.5,0,7); g.fill(); });
    }
  } else {
    g.fillStyle = '#1c1008';
    g.beginPath(); g.arc(0,-64,15,Math.PI,0); g.fill();
    g.beginPath(); g.ellipse(0,-68,14,8,0,0,7); g.fill();
    g.beginPath(); g.arc(-14,-60,4,0,7); g.fill();
    g.beginPath(); g.arc(14,-60,4,0,7); g.fill();
    if(detail){ // små tighta lockar
      g.fillStyle='#2a1a10'; [[-9,-72],[0,-75],[9,-72],[-13,-66],[13,-66]].forEach(cu=>{g.beginPath();g.arc(cu[0],cu[1],3,0,7);g.fill();}); }
  }
  // ögon (med liten glans i detail-läge)
  g.fillStyle = '#222';
  g.beginPath(); g.arc(5,-61,2.4,0,7); g.fill();
  g.beginPath(); g.arc(12,-61,2.4,0,7); g.fill();
  if(detail){ g.fillStyle='#fff'; g.beginPath(); g.arc(5.8,-61.8,0.9,0,7); g.fill(); g.beginPath(); g.arc(12.8,-61.8,0.9,0,7); g.fill(); }
  // näsa
  g.strokeStyle=c.spider?'rgba(0,0,0,0.25)':'rgba(150,90,60,0.5)'; g.lineWidth=1.5;
  g.beginPath(); g.moveTo(9,-58); g.lineTo(9.5,-55); g.stroke();
  // mun
  g.strokeStyle = '#c0392b'; g.lineWidth = 2;
  g.beginPath(); g.arc(8,-55,4,0.2,Math.PI-0.2); g.stroke();
  // rosa kinder i detail
  if(detail){ g.fillStyle='rgba(255,140,140,0.35)';
    g.beginPath(); g.arc(2,-54,2.6,0,7); g.fill(); g.beginPath(); g.arc(14,-54,2.6,0,7); g.fill(); }
}
function drawPreviews() {
  document.querySelectorAll('.char').forEach(b=>{
    const pc = b.querySelector('canvas'); if (!pc) return;
    try { const g=pc.getContext('2d'); g.clearRect(0,0,pc.width,pc.height);
      // mjuk skugga under gubben
      g.save(); g.translate(pc.width/2, pc.height-8);
      g.fillStyle='rgba(0,0,0,0.12)'; g.beginPath(); g.ellipse(0,2,26,7,0,0,7); g.fill();
      // större och mer detaljerad figur
      g.scale(1.28,1.28);
      renderFigure(g,CHARS[b.dataset.c],0,0,true); g.restore();
    } catch(e){}
  });
}
drawPreviews(); window.addEventListener('load', drawPreviews);
document.querySelectorAll('.char').forEach(b=>{
  b.addEventListener('click', ()=>{ document.querySelectorAll('.char').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); heroKey=b.dataset.c; beep(660,0.1,'square',0.1); });
});
document.querySelectorAll('.lvl').forEach(b=>{
  b.addEventListener('click', ()=>{ document.querySelectorAll('.lvl').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); levelNum=+b.dataset.l; beep(550,0.1,'square',0.1); });
});

// ---------- ljud ----------
let AC = null;
function ensureAC(){ if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} if(AC&&AC.state==='suspended')AC.resume(); return AC; }
function beep(freq,dur,type,vol,slide){ type=type||'sine';vol=vol===undefined?0.15:vol;slide=slide||0;
  try{ if(!ensureAC())return; const o=AC.createOscillator(),g=AC.createGain(); o.type=type;o.frequency.value=freq;
    if(slide)o.frequency.linearRampToValueAtTime(freq+slide,AC.currentTime+dur);
    g.gain.value=vol;g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur);}catch(e){} }
const sJump=()=>beep(300,0.25,'square',0.12,200);
const sStar=()=>{beep(880,0.12,'sine',0.15);setTimeout(()=>beep(1320,0.15,'sine',0.15),90);};
const sOops=()=>beep(220,0.4,'sawtooth',0.12,-120);
const sBoop=()=>beep(500,0.18,'triangle',0.18,300);
const sWin=()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.3,'square',0.13),i*160));};
const sFart=()=>{beep(110,0.3,'sawtooth',0.16,-50);setTimeout(()=>beep(85,0.22,'sawtooth',0.13,-30),120);};
const sThrow=()=>beep(620,0.18,'square',0.12,400);
const sBurp=()=>{beep(90,0.35,'sawtooth',0.18,40);setTimeout(()=>beep(70,0.25,'square',0.14,30),140);};
const sSpit=()=>beep(260,0.2,'sawtooth',0.13,-140);

// ---------- musik ----------
let musicOn=true, musicTimer=null, musicGain=null, nextNote=0, mStep=0;
const TEMPO=106, STEP_T=60/TEMPO/4;
function mTone(freq,t,dur,type,vol,dest){ const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.008);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(dest);o.start(t);o.stop(t+dur+0.05); }
function mKick(t){ const o=AC.createOscillator(),g=AC.createGain();o.type='sine';
  o.frequency.setValueAtTime(140,t);o.frequency.exponentialRampToValueAtTime(45,t+0.1);
  g.gain.setValueAtTime(0.9,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
  o.connect(g);g.connect(musicGain);o.start(t);o.stop(t+0.2); }
function mShaker(t,vol){ const len=0.05,buf=AC.createBuffer(1,AC.sampleRate*len,AC.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  const src=AC.createBufferSource();src.buffer=buf;const f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=6000;
  const g=AC.createGain();g.gain.value=vol;src.connect(f);f.connect(g);g.connect(musicGain);src.start(t); }
function mRim(t){ mTone(1750,t,0.045,'square',0.18,musicGain); }
const BASS={0:55,3:55,6:65.4,10:82.4,14:49,16:55,19:55,22:73.4,26:82.4,30:65.4};
const MEL={2:329.6,5:392,8:440,13:392,18:329.6,21:293.7,24:261.6,29:220};
const KICK=[0,6,10], RIM=[4,12,14];
function scheduleStep(s,t){ const bs=s%16;
  if(KICK.indexOf(bs)>-1)mKick(t);
  if(s%2===1)mShaker(t,bs%4===3?0.3:0.15);
  if(RIM.indexOf(bs)>-1&&(s<16?bs!==14:true))mRim(t);
  if(BASS[s]!==undefined)mTone(BASS[s],t,0.22,'triangle',0.65,musicGain);
  if(MEL[s]!==undefined){mTone(MEL[s],t,0.3,'sine',0.3,musicGain);mTone(MEL[s]*2,t,0.12,'triangle',0.1,musicGain);} }
function musicTick(){ if(!AC||!musicGain)return; while(nextNote<AC.currentTime+0.15){scheduleStep(mStep%32,nextNote);nextNote+=STEP_T;mStep++;} }
function startMusic(){ if(!ensureAC()||musicTimer)return; musicGain=AC.createGain();musicGain.gain.value=0.07;
  musicGain.connect(AC.destination);nextNote=AC.currentTime+0.05;mStep=0;musicTimer=setInterval(musicTick,40); }
function stopMusic(){ if(musicTimer){clearInterval(musicTimer);musicTimer=null;} if(musicGain){try{musicGain.disconnect();}catch(e){}musicGain=null;} }
musicBtn.addEventListener('click',()=>{ musicOn=!musicOn; musicBtn.textContent=musicOn?'🎵':'🔇'; if(musicOn)startMusic();else stopMusic(); });

// ---------- input ----------
const keys={l:false,r:false,j:false,s:false};
addEventListener('keydown',e=>{ if(e.code==='ArrowLeft')keys.l=true; if(e.code==='ArrowRight')keys.r=true;
  if(e.code==='Space'||e.code==='ArrowUp'){keys.j=true;e.preventDefault();} if(e.code==='KeyF'){keys.s=true;e.preventDefault();} });
addEventListener('keyup',e=>{ if(e.code==='ArrowLeft')keys.l=false; if(e.code==='ArrowRight')keys.r=false;
  if(e.code==='Space'||e.code==='ArrowUp')keys.j=false; if(e.code==='KeyF')keys.s=false; });
function bindBtn(el,prop){ const on=e=>{e.preventDefault();keys[prop]=true;};const off=e=>{e.preventDefault();keys[prop]=false;};
  el.addEventListener('pointerdown',on);el.addEventListener('pointerup',off);el.addEventListener('pointerleave',off);el.addEventListener('pointercancel',off); }
bindBtn(btnL,'l');bindBtn(btnR,'r');bindBtn(btnJ,'j');bindBtn(btnS,'s');

// ---------- värld ----------
let LEVEL_END=5750;
let player,cam,collects,poops,enemies,platforms,checkpoints,boss,particles,clouds,farts,frisbees,flowers,shop,lifts,skyItems,skyTimer,flag,projectiles,slide;
let score,state,msgTimer,time=0,invuln=0,jumpHeld=false,shootHeld=false,shootCD=0;

function makeWorld() {
  player={x:80,y:GROUND-70,w:44,h:70,vx:0,vy:0,onGround:false,face:1,squash:1};
  cam=0;score=0;invuln=0;
  particles=[];farts=[];frisbees=[];skyItems=[];skyTimer=3;projectiles=[];slide=null;
  clouds=Array.from({length:14},(_,i)=>({x:i*450+Math.random()*200,y:40+Math.random()*120,s:0.7+Math.random()*0.8}));

  if (levelNum===1) {
    LEVEL_END=5750;
    const flavors=['melon','solero'];
    collects=[400,700,1000,1250,1500,1850,2200,2500,2750,3100,3450,3800,4100,4400,4700,5000].map((x,i)=>({x,y:GROUND-120-((x/250|0)%3)*55,got:false,t:Math.random()*6,flavor:flavors[i%2]}));
    poops=[550,900,1350,1700,2050,2400,2850,3250,3650,4050,4450,4850].map(x=>({x,y:GROUND-34,w:46,h:34}));
    enemies=[{x:1150,min:1050,max:1350},{x:2300,min:2150,max:2550},{x:3000,min:2900,max:3200},{x:3900,min:3750,max:4150},{x:4650,min:4550,max:4800}]
      .map(s=>({...s,type:'skunk',y:GROUND-40,w:52,h:40,dir:1,dead:false,deadT:0,fartT:2+Math.random()*4}));
    platforms=[{x:760,y:GROUND-70,w:90,h:22},{x:870,y:GROUND-130,w:90,h:22},{x:980,y:GROUND-190,w:90,h:22},
      {x:1560,y:GROUND-120,w:130,h:22},
      {x:2300,y:GROUND-70,w:90,h:22},{x:2410,y:GROUND-130,w:90,h:22},{x:2520,y:GROUND-190,w:90,h:22},{x:2630,y:GROUND-250,w:90,h:22},
      {x:3500,y:GROUND-125,w:140,h:22},
      {x:4150,y:GROUND-70,w:90,h:22},{x:4260,y:GROUND-130,w:90,h:22},{x:4370,y:GROUND-190,w:90,h:22}];

let respawnX=80;
function showMsg(t,ms){ ms=ms||1400; msgEl.textContent=t; msgEl.style.opacity=1; clearTimeout(msgTimer); msgTimer=setTimeout(()=>msgEl.style.opacity=0,ms); }
function emit(x,y,n,colors,spread,up){ spread=spread||6;up=up||8;
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*spread,vy:-Math.random()*up-2,c:colors[Math.random()*colors.length|0],r:3+Math.random()*5,life:1}); }

// ---------- ritfigurer ----------
function drawMushroom(g,r){
  g.fillStyle='#e8201b'; g.beginPath(); g.arc(0,0,r,Math.PI,0); g.fill();
  g.beginPath(); g.ellipse(0,0,r,r*0.32,0,0,Math.PI); g.fill();
  g.fillStyle='#fff';
  g.beginPath(); g.arc(0,-r*0.35,r*0.32,0,7); g.fill();
  g.beginPath(); g.arc(-r*0.6,-r*0.05,r*0.16,0,7); g.fill();
  g.beginPath(); g.arc(r*0.6,-r*0.1,r*0.14,0,7); g.fill();
  g.fillStyle='#f4f1ec'; g.beginPath(); g.roundRect(-r*0.62,r*0.02,r*1.24,r*0.78,r*0.18); g.fill();
  g.fillStyle='#4a2c1a';
  g.beginPath(); g.ellipse(-r*0.22,r*0.32,r*0.05,r*0.08,0,0,7); g.fill();
  g.beginPath(); g.ellipse(r*0.22,r*0.32,r*0.05,r*0.08,0,0,7); g.fill();
  g.strokeStyle='#4a2c1a'; g.lineWidth=Math.max(1.5,r*0.04); g.lineCap='round';
  g.beginPath(); g.arc(0,r*0.34,r*0.16,0.15,Math.PI-0.15); g.stroke();
  g.fillStyle='rgba(255,150,170,0.6)';
  g.beginPath(); g.arc(-r*0.42,r*0.46,r*0.1,0,7); g.fill();
  g.beginPath(); g.arc(r*0.42,r*0.46,r*0.1,0,7); g.fill();
}
function drawBasketball(g,r){
  g.fillStyle='#e8772e'; g.beginPath(); g.arc(0,0,r,0,7); g.fill();
  g.strokeStyle='#1a1a1a'; g.lineWidth=2; g.lineCap='round';
  g.beginPath(); g.moveTo(-r,0); g.lineTo(r,0); g.stroke();
  g.beginPath(); g.moveTo(0,-r); g.lineTo(0,r); g.stroke();
  g.beginPath(); g.arc(-r*1.1,0,r*0.9,-0.7,0.7); g.stroke();
  g.beginPath(); g.arc(r*1.1,0,r*0.9,Math.PI-0.7,Math.PI+0.7); g.stroke();
}
function drawHero(px,py){ const p=player,c=CHARS[heroKey];
  ctx.save(); ctx.translate(px+p.w/2,py+p.h); ctx.scale(p.face,1); ctx.scale(1/Math.sqrt(p.squash),p.squash);
  if(invuln>0&&Math.floor(time*12)%2===0)ctx.globalAlpha=0.4;
  const run=p.onGround&&Math.abs(p.vx)>0.5?Math.sin(time*16)*8:0; const arm=p.onGround?run*0.5:-10;
  renderFigure(ctx,c,run,arm); ctx.restore(); }

function drawBoss(){
  if(boss.dead&&boss.deadT>2.2)return;
  const bx=boss.x-cam,by=boss.y;
  ctx.save(); ctx.translate(bx+boss.w/2,by+boss.h);
  let sz=boss.size; if(boss.hurt>0)sz*=1-Math.sin(boss.hurt*20)*0.08; if(boss.dead)sz*=Math.max(0,1-boss.deadT/2);
  ctx.scale(sz,sz); const wob=Math.sin(time*4)*3;
  if(boss.type==='poo'){
    ctx.font='130px serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText('💩',0,10+wob*0.3);
    ctx.strokeStyle='#4a2c12'; ctx.lineWidth=7; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-42,-78+wob); ctx.lineTo(-16,-66+wob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(42,-78+wob); ctx.lineTo(16,-66+wob); ctx.stroke();
  } else {
    // BIG BOSS LAMA 🦙
    const fc=boss.dir; ctx.scale(fc,1);
    // hals + huvud
    ctx.fillStyle='#f0e6d2';
    ctx.beginPath(); ctx.roundRect(-55,-30,90,52,16); ctx.fill(); // kropp
    ctx.beginPath(); ctx.roundRect(10,-95,26,70,12); ctx.fill(); // hals
    ctx.beginPath(); ctx.ellipse(34,-100,24,20,0,0,7); ctx.fill(); // huvud
    ctx.beginPath(); ctx.ellipse(48,-96,12,9,0,0,7); ctx.fill(); // nos
    // öron
    ctx.beginPath(); ctx.moveTo(22,-116); ctx.lineTo(18,-132); ctx.lineTo(30,-118); ctx.fill();
    ctx.beginPath(); ctx.moveTo(40,-116); ctx.lineTo(46,-132); ctx.lineTo(48,-116); ctx.fill();
    // ben
    ctx.fillStyle='#e0d2b8';
    [-40,-15,12,30].forEach(lx=>{ ctx.fillRect(lx,18,12,26); });
    // ögon (arga)
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(34,-104,3,0,7); ctx.fill();
    ctx.strokeStyle='#5a4a2a'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(26,-110); ctx.lineTo(40,-106); ctx.stroke();
    // mun (gapar när den spottar)
    ctx.fillStyle='#a85';
    if(boss.spitT<0.5){ ctx.beginPath(); ctx.ellipse(52,-90,7,6,0,0,7); ctx.fill(); }
  }
  ctx.restore();
  if(!boss.dead){
    ctx.font='26px serif'; ctx.textAlign='center';
    for(let i=0;i<boss.hp;i++)ctx.fillText('💜',bx+boss.w/2-32+i*32,by-20);
    ctx.font='bold 18px Comic Sans MS, sans-serif'; ctx.fillStyle='#5a3a1a';
    ctx.fillText(boss.type==='poo'?'BAJSMONSTRET':'BIG BOSS LAMA',bx+boss.w/2,by-50);
  }
}

// ---------- uppdatering ----------
function respawn(){
  sOops(); emit(player.x-cam+player.w/2,player.y+player.h/2,14,['#8a5a2b','#b07a3f','#fff']);
  const fun=['Oj då! 💨','Usch! 😝','Hoppsan! Försök igen!','Nästan! Du klarar det! 💪'];
  showMsg(fun[Math.random()*fun.length|0]);
  player.x=Math.max(40,player.x-150); player.y=GROUND-200; player.vx=0; player.vy=0; invuln=2;
}

function update(dt){
  time+=dt; if(invuln>0)invuln-=dt;
  const p=player; const sp=4.6;
  if(keys.l){p.vx=-sp;p.face=-1;} else if(keys.r){p.vx=sp;p.face=1;} else p.vx*=0.7;
  if(keys.j&&p.onGround&&!jumpHeld){p.vy=-17.5;p.onGround=false;sJump();p.squash=1.25;}
  jumpHeld=keys.j;
  if(shootCD>0)shootCD-=dt;
  if(keys.s&&!shootHeld&&shootCD<=0){ frisbees.push({x:p.x+p.w/2,y:p.y+30,dir:p.face,t:0,spin:0}); shootCD=0.35; sThrow(); }
  shootHeld=keys.s;
  p.vy+=38*dt; if(p.vy>18)p.vy=18;
  p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=0; p.squash+=(1-p.squash)*0.15;

  p.onGround=false;
  if(p.y+p.h>=GROUND){p.y=GROUND-p.h;if(p.vy>6)p.squash=0.75;p.vy=0;p.onGround=true;}
  platforms.forEach(pl=>{ if(p.vy>=0&&p.x+p.w>pl.x+6&&p.x<pl.x+pl.w-6&&p.y+p.h>=pl.y&&p.y+p.h<=pl.y+22){p.y=pl.y-p.h;p.vy=0;p.onGround=true;} });

  lifts.forEach(lf=>{ lf.y=lf.baseY+(lf.topY-lf.baseY)*(0.5-0.5*Math.cos(time*0.6+lf.phase));
    if(p.vy>=0&&p.x+p.w>lf.x-29&&p.x<lf.x+29&&p.y+p.h>=lf.y&&p.y+p.h<=lf.y+22){p.y=lf.y-p.h;p.vy=0;p.onGround=true;} });

  flowers.forEach(fl=>{ if(fl.bounce>0)fl.bounce-=dt*4; const top=fl.y-18;
    if(p.vy>0&&p.x+p.w-10>fl.x-26&&p.x+10<fl.x+26&&p.y+p.h>=top&&p.y+p.h<=top+26){p.y=top-p.h;p.vy=-23;p.onGround=false;fl.bounce=1;sBoop();emit(fl.x-cam,top,8,['#c77dff','#e0aaff','#fff']);} });

  // valrutschkana – glid snabbt nedför rampen! 🐳
  if(slide){
    const cx=p.x+p.w/2;
    if(cx>slide.x1&&cx<slide.x2){
      const tt=(cx-slide.x1)/(slide.x2-slide.x1);
      const rampY=slide.y1+(slide.y2-slide.y1)*tt;
      if(p.y+p.h>=rampY-6 && p.y+p.h<=rampY+40){
        p.y=rampY-p.h; p.vy=0; p.onGround=true;
        p.x+=2.8; // dras nedför kanan
        if(Math.random()<0.3)emit(cx-cam,rampY,2,['#bfe4fb','#fff','#7ec8ff'],3,3);
        if(!slide.riding){slide.riding=true;showMsg('IIIIH! Valrutschkana! 🐳🛝',1200);sBoop();}
      }
    } else slide.riding=false;
  }

  // butik/skylt: bana 1 = godis (poäng), bana 2 = bara skylt
  if(shop.type==='candy'&&!shop.ate&&p.x+p.w>shop.x&&p.x<shop.x+shop.w){
    shop.ate=true;score+=5;sStar();showMsg('MUMS! Godis från KVILLETORGET! 🍭🍬 +5',1600);
    emit(p.x-cam+p.w/2,p.y+20,16,['#ff8ae0','#ffd83d','#7ec8ff','#ff5a5a']);
  }

  collects.forEach(s=>{ s.t+=dt*3;
    if(!s.got&&Math.abs(p.x+p.w/2-s.x)<34&&Math.abs(p.y+p.h/2-(s.y+Math.sin(s.t)*8))<44){
      s.got=true;score++;sStar();
      emit(s.x-cam,s.y,10, s.flavor==='ball'?['#e8772e','#fff','#1a1a1a']:['#ff5a6e','#2eb85c','#fff','#ff7eb3']);
      if(score%5===0)showMsg(levelNum===1?'Mums! 🍦 '+score:'Snyggt! 🏀 '+score,1000);
    } });

  checkpoints.forEach(c=>{ if(!c.hit&&p.x>c.x){c.hit=true;respawnX=c.x;showMsg('Checkpoint! 🚩',1000);sBoop();} });

  if(invuln<=0)poops.forEach(o=>{ if(p.x+p.w-8>o.x&&p.x+8<o.x+o.w&&p.y+p.h>o.y+8)respawn(); });

  // fiender (skunk eller flodhäst)
  enemies.forEach(s=>{
    if(s.dead){s.deadT+=dt;return;}
    s.x+=s.dir*1.4; if(s.x<s.min||s.x>s.max)s.dir*=-1;
    const dist=Math.abs(p.x-s.x);
    if(dist<650){ s.fartT-=dt;
      if(s.fartT<=0){ s.fartT=3.5+Math.random()*3; const fdir=p.x<s.x?-1:1;
        if(s.type==='skunk'){ farts.push({x:s.x+(fdir>0?s.w:-10),y:GROUND-26,w:30,h:24,dir:fdir,life:4,t:0,kind:'fart'}); emit(s.x-cam+s.w/2,s.y+s.h-6,6,['#a8e063','#c7f08a','#8fd14f'],4,4); if(dist<550)sFart(); }
        else { farts.push({x:s.x+(fdir>0?s.w:-10),y:GROUND-30,w:36,h:28,dir:fdir,life:3.5,t:0,kind:'burp'}); emit(s.x-cam+s.w/2,s.y+s.h-10,7,['#6fcf4a','#9fe06a','#4fa030'],5,4); if(dist<550)sBurp(); s.gape=0.6; }
      } }
    if(s.gape>0)s.gape-=dt;
    const hitX=p.x+p.w-8>s.x&&p.x+8<s.x+s.w;
    const stomp=hitX&&p.vy>2&&p.y+p.h>s.y&&p.y+p.h<s.y+28;
    if(stomp){ s.dead=true;p.vy=-10;sBoop();score+=2;
      emit(s.x-cam+s.w/2,s.y,12, s.type==='skunk'?['#fff','#222','#aaa']:['#8a6fc7','#fff','#b9a0e8']);
      showMsg(s.type==='skunk'?'Boing! 🦨💨':'Boing! 🦛💚',900);
    } else if(invuln<=0&&hitX&&p.y+p.h>s.y+10&&p.y<s.y+s.h)respawn();
  });

  // pruttar/rapar som glider längs marken
  farts.forEach(f=>{ f.x+=f.dir*2.6; f.t+=dt; f.life-=dt;
    if(invuln<=0&&f.life>0&&p.x+p.w-10>f.x&&p.x+10<f.x+f.w&&p.y+p.h>GROUND-f.h-4){ f.life=0; respawn(); showMsg(f.kind==='burp'?'Usch, en grön rap! 🦛💚🤢':'Usch, en prutt! 💨🤢'); } });
  farts=farts.filter(f=>f.life>0);

  // frisbees
  frisbees.forEach(fr=>{ fr.x+=fr.dir*8.5; fr.t+=dt; fr.spin+=dt*20;
    enemies.forEach(s=>{ if(!s.dead&&Math.abs(fr.x-(s.x+s.w/2))<34&&Math.abs(fr.y-(s.y+s.h/2))<36){ s.dead=true;fr.t=99;score+=2;sBoop(); emit(s.x-cam+s.w/2,s.y,12,['#5a96ff','#fff','#222']); showMsg('PANG! 🥏',800); } });
    if(!boss.dead&&boss.hurt<=0&&fr.x>boss.x+15&&fr.x<boss.x+boss.w-15&&fr.y>boss.y&&fr.y<boss.y+boss.h){
      fr.t=99;boss.hp--;boss.hurt=0.8;boss.size*=0.85;sBoop(); emit(boss.x-cam+boss.w/2,boss.y+30,14,['#5a96ff','#8a5a2b','#fff']);
      if(boss.hp<=0){boss.dead=true;sWin();showMsg(levelNum===1?'PFFFFT! 💨🚽 Spring till Karlatornet! 🏢🚩':'BÄÄÄH! 🦙 Spring till mål! 🚩',2200);} else showMsg('PANG! 🥏',800);
    } });
  frisbees=frisbees.filter(fr=>fr.t<3&&fr.x>cam-60&&fr.x<cam+W+60);

  // himmelsföremål: svamp (bana 1) eller basketboll (bana 2)
  skyTimer-=dt;
  if(skyTimer<=0&&state==='play'){ skyTimer=(levelNum===1?4:3)+Math.random()*4;
    skyItems.push({x:cam+150+Math.random()*(W-300),y:-40,vy:1.6+Math.random()*0.9,sway:Math.random()*6,got:false}); }
  skyItems.forEach(m=>{ m.y+=m.vy; m.sway+=dt*2; const mx=m.x+Math.sin(m.sway)*1.5;
    if(!m.got&&Math.abs(p.x+p.w/2-mx)<42&&Math.abs(p.y+p.h/2-m.y)<48){ m.got=true;score+=3;sStar();
      emit(mx-cam,m.y,16, levelNum===1?['#e8201b','#fff','#ff9eb0']:['#e8772e','#fff','#1a1a1a']);
      showMsg(levelNum===1?'Svamp-kompis! 🍄 +3':'Basket! 🏀 +3',1100); } });
  skyItems=skyItems.filter(m=>!m.got&&m.y<GROUND-10);

  // boss-rörelse
  if(!boss.dead){
    boss.jumpT-=dt; const near=p.x>boss.x-500;
    if(near){ boss.dir = p.x < boss.x ? -1 : 1;
      if(boss.type==='poo'){ boss.x+=(p.x<boss.x?-1:1)*0.8;
        if(boss.jumpT<=0&&boss.onGround){boss.vy=-9;boss.onGround=false;boss.jumpT=1.6+Math.random()*1.4;} }
      else { // lama spottar beige projektiler – som big boss
        boss.spitT-=dt;
        if(boss.spitT<=0){ boss.spitT=1.8+Math.random()*1.2; sSpit();
          const dx=(p.x-boss.x); const dir=dx<0?-1:1;
          projectiles.push({x:boss.x+boss.w/2,y:boss.y+30,vx:dir*5.5,vy:-3,t:0});
          emit(boss.x-cam+boss.w/2,boss.y+30,6,['#d8c9a0','#c2b189','#efe6cf']);
        }
      }
    }
    boss.vy+=30*dt; boss.y+=boss.vy;
    if(boss.y+boss.h>=GROUND){boss.y=GROUND-boss.h;boss.vy=0;boss.onGround=true;}
    if(boss.hurt>0)boss.hurt-=dt;
    const hb={x:boss.x+15,w:boss.w-30};
    const hitX=p.x+p.w-6>hb.x&&p.x+6<hb.x+hb.w;
    const stomp=hitX&&p.vy>2&&p.y+p.h>boss.y&&p.y+p.h<boss.y+50;
    if(stomp&&boss.hurt<=0){ boss.hp--;boss.hurt=0.8;boss.size*=0.85;p.vy=-12;sBoop();
      emit(boss.x-cam+boss.w/2,boss.y+30,16, boss.type==='poo'?['#8a5a2b','#b07a3f','#6b4423']:['#f0e6d2','#d8c9a0','#fff']);
      if(boss.hp>0)showMsg(['SPLAT! 💥','Igen! 💪','En gång till!'][3-boss.hp-1]||'PANG!',1000);
      if(boss.hp<=0){boss.dead=true;sWin();showMsg(levelNum===1?'PFFFFT! 💨🚽 Spring till Karlatornet! 🏢🚩':'BÄÄÄH! 🦙 Spring till mål! 🚩',2200);}
    } else if(invuln<=0&&!stomp&&hitX&&p.y+p.h>boss.y+40&&p.y<boss.y+boss.h&&boss.hurt<=0)respawn();
  } else { boss.deadT+=dt; if(boss.deadT<2)emit(boss.x-cam+boss.w/2,boss.y+boss.h/2,2,['#8a5a2b','#fff','#7ec8ff']); }

  // beige lama-spott
  projectiles.forEach(pr=>{ pr.x+=pr.vx; pr.vy+=22*dt; pr.y+=pr.vy; pr.t+=dt;
    if(invuln<=0&&Math.abs(p.x+p.w/2-pr.x)<26&&Math.abs(p.y+p.h/2-pr.y)<32){ pr.t=99; respawn(); showMsg('Beige lama-spott! 🦙💦🤢'); } });
  projectiles=projectiles.filter(pr=>pr.t<4&&pr.y<GROUND+10);

  // målflagga (Karlatornet bana 1 / vanlig mål-stång bana 2)
  if(boss.dead&&state==='play'&&p.x+p.w>flag.x){ flag.pulled+=dt*0.8;
    if(flag.pulled>=1){ flag.pulled=1; state='winning';
      emit(flag.x-cam,200,30,['#ffd83d','#ff5a5a','#3fbf5a','#5a8aff','#ff8ae0'],10,12); } }
  if(state==='winning'){ boss.deadT+=dt;
    if(boss.deadT>1.2){ state='won'; sWin();
      for(let i=0;i<5;i++)setTimeout(()=>emit(200+Math.random()*500,100+Math.random()*150,25,['#ff5a5a','#ffd83d','#3fbf5a','#5a8aff','#ff8ae0'],10,12),i*350); } }

  particles.forEach(pa=>{pa.x+=pa.vx;pa.y+=pa.vy;pa.vy+=0.35;pa.life-=dt*1.2;});
  particles=particles.filter(pa=>pa.life>0);

  cam+=((p.x-280)-cam)*0.1; if(cam<0)cam=0; if(cam>LEVEL_END-W+100)cam=LEVEL_END-W+100;
  hud.textContent=(levelNum===1?'🍦 ':'🏀 ')+score;
}

// ---------- rendering ----------
function draw(){
  const sky1=levelNum===1?'#7ec8ff':'#9ad4f0', sky2=levelNum===1?'#c8f0ff':'#d8f3e8';
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,sky1); g.addColorStop(1,sky2);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.font='60px serif'; ctx.textAlign='left'; ctx.textBaseline='alphabetic'; ctx.fillText('🌞',790,80);
  ctx.font='50px serif';
  clouds.forEach(c=>{ const x=(c.x-cam*0.4)%(LEVEL_END); if(x>-80&&x<W+80){ctx.save();ctx.translate(x,c.y);ctx.scale(c.s,c.s);ctx.fillText('☁️',0,0);ctx.restore();} });
  // kullar
  ctx.fillStyle=levelNum===1?'#a8e063':'#8fd14f';
  for(let i=0;i<8;i++){ const hx=(i*900-cam*0.6)%(LEVEL_END); ctx.beginPath(); ctx.arc(hx,GROUND+60,160,Math.PI,0); ctx.fill(); }

  // 🗼 EIFFELTORN i fjärran (parallax-bakgrund)
  (function(){
    const ex = (levelNum===1?1600:2400) - cam*0.45; // glider långsamt = långt borta
    if(ex>-120 && ex<W+120){
      const baseY=GROUND-4, topY=GROUND-230, midY=GROUND-130;
      ctx.strokeStyle='rgba(110,90,70,0.55)'; ctx.fillStyle='rgba(125,100,78,0.5)'; ctx.lineWidth=3;
      // ben
      ctx.beginPath(); ctx.moveTo(ex-34,baseY); ctx.lineTo(ex-9,topY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex+34,baseY); ctx.lineTo(ex+9,topY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex-22,baseY); ctx.lineTo(ex-6,topY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex+22,baseY); ctx.lineTo(ex+6,topY); ctx.stroke();
      // tvärbågar
      ctx.beginPath(); ctx.moveTo(ex-30,GROUND-40); ctx.quadraticCurveTo(ex,GROUND-58,ex+30,GROUND-40); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex-22,midY); ctx.lineTo(ex+22,midY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex-12,GROUND-180); ctx.lineTo(ex+12,GROUND-180); ctx.stroke();
      // topp + spira
      ctx.beginPath(); ctx.moveTo(ex-9,topY); ctx.lineTo(ex+9,topY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex,topY); ctx.lineTo(ex,topY-22); ctx.stroke();
    }
  })();
  // mark
  ctx.fillStyle=levelNum===1?'#5fc24e':'#e8d59a'; ctx.fillRect(0,GROUND,W,H-GROUND); // bana2 = sandfärgad lekpark
  ctx.fillStyle=levelNum===1?'#8a5a2b':'#d4be7e'; ctx.fillRect(0,GROUND+22,W,H-GROUND);
  ctx.font='22px serif';
  for(let i=0;i<40;i++){ const fx=i*150-cam; if(fx>-30&&fx<W+30)ctx.fillText(levelNum===1?['🌸','🌼','🌷'][i%3]:['🌳','🪁','🌻'][i%3],fx,GROUND+18); }

  // bana 2: blåval-rutschkana man åker nedför
  if(levelNum===2&&slide){
    const x1=slide.x1-cam, x2=slide.x2-cam;
    if(x2>-100&&x1<W+200){
      // valens kropp uppe vid toppen (man klättrar upp via trappan bredvid)
      const hx=slide.x1-cam, hy=slide.y1;
      ctx.fillStyle='#3a86c8';
      ctx.beginPath(); ctx.ellipse(hx-30,hy-30,72,48,0,0,7); ctx.fill();
      ctx.fillStyle='#bfe4fb'; ctx.beginPath(); ctx.ellipse(hx-30,hy-14,52,26,0,0,Math.PI); ctx.fill();
      // öga
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(hx-66,hy-40,9,0,7); ctx.fill();
      ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(hx-68,hy-40,4,0,7); ctx.fill();
      // leende
      ctx.strokeStyle='#1d4e73';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.arc(hx-58,hy-26,12,0.1,1.1);ctx.stroke();
      // vattenspruta
      ctx.fillStyle='#bfe4fb'; ctx.beginPath(); ctx.ellipse(hx-30,hy-78,8,22,0,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc(hx-38,hy-96,5,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(hx-22,hy-92,4,0,7); ctx.fill();
      // själva rutschkanan (gul glansig ramp)
      ctx.strokeStyle='#ffcf3d'; ctx.lineWidth=16; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(x1,slide.y1); ctx.lineTo(x2,slide.y2); ctx.stroke();
      ctx.strokeStyle='#fff3b0'; ctx.lineWidth=5;
      ctx.beginPath(); ctx.moveTo(x1,slide.y1-4); ctx.lineTo(x2,slide.y2-4); ctx.stroke();
      // kanträcken
      ctx.strokeStyle='#3a86c8'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(x1,slide.y1+9); ctx.lineTo(x2,slide.y2+9); ctx.stroke();
      // klättertrappa upp till toppen
      ctx.fillStyle='#c89b5a';
      for(let i=0;i<3;i++) ctx.fillRect(x1-50, slide.y1+i*30, 38, 10);
      ctx.fillStyle='#5a3a1a'; ctx.font='bold 13px Comic Sans MS'; ctx.textAlign='center'; ctx.fillText('🐳 VALRUTSCHKANA',hx-30,hy-100);
    }
  }

  // plattformar (trappor)
  platforms.forEach(pl=>{ const x=pl.x-cam; if(x<-200||x>W+200)return;
    ctx.fillStyle=levelNum===1?'#8a6a2b':'#c89b5a'; ctx.beginPath(); ctx.roundRect(x,pl.y,pl.w,pl.h,8); ctx.fill();
    ctx.fillStyle=levelNum===1?'#5fc24e':'#7fb04a'; ctx.beginPath(); ctx.roundRect(x,pl.y,pl.w,9,6); ctx.fill();
    ctx.strokeStyle='#3f9c4f'; ctx.lineWidth=2; for(let i=8;i<pl.w-4;i+=16){ctx.beginPath();ctx.moveTo(x+i,pl.y+2);ctx.lineTo(x+i-2,pl.y-5);ctx.stroke();} });

  // hissar
  lifts.forEach(lf=>{ const x=lf.x-cam; if(x<-80||x>W+80)return;
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;ctx.setLineDash([6,8]);
    ctx.beginPath();ctx.moveTo(x,lf.topY-10);ctx.lineTo(x,lf.baseY);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#f7d9a0'; ctx.beginPath();ctx.moveTo(x-30,lf.y);ctx.lineTo(x+30,lf.y);ctx.lineTo(x,lf.y+34);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#c99a5b';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x-18,lf.y+8);ctx.lineTo(x-6,lf.y+30);ctx.moveTo(x,lf.y+6);ctx.lineTo(x,lf.y+34);ctx.moveTo(x+18,lf.y+8);ctx.lineTo(x+6,lf.y+30);ctx.stroke();
    ctx.fillStyle='#ff8ad0'; ctx.beginPath();ctx.arc(x,lf.y-2,32,Math.PI,0);ctx.fill();
    ctx.fillStyle='#ffd1ec'; ctx.beginPath();ctx.arc(x-8,lf.y-8,8,0,7);ctx.fill();
    ctx.font='16px serif';ctx.textAlign='center';ctx.fillText('🍦',x,lf.y-30); });

  // PLIKTA-skylt (bana2) eller KVILLETORGET godisbutik (bana1)
  if(shop.type==='candy'){
    const x=shop.x-cam; if(x>-260&&x<W+40){ const sw=shop.w,sh=150,sy=GROUND-sh;
      ctx.fillStyle='#ffe0ec';ctx.fillRect(x,sy,sw,sh);
      for(let i=0;i<sw/26;i++){ctx.fillStyle=i%2?'#ff5a8a':'#fff';ctx.fillRect(x+i*26,sy,26,22);}
      ctx.fillStyle='#7a2d52';ctx.beginPath();ctx.roundRect(x+10,sy-40,sw-20,34,8);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 22px Comic Sans MS';ctx.textAlign='center';ctx.fillText('🍭 KVILLETORGET 🍬',x+sw/2,sy-15);
      ctx.fillStyle='#bfe9ff';ctx.fillRect(x+20,sy+34,sw-40,70);
      ctx.font='30px serif';ctx.textAlign='left'; ['🍬','🍭','🍫','🧁','🍩','🍡'].forEach((e,i)=>ctx.fillText(e,x+30+i*((sw-60)/6),sy+78));
      ctx.fillStyle='#7a4a2b';ctx.fillRect(x+sw/2-22,sy+110,44,sh-110);
      ctx.fillStyle='#ffd83d';ctx.beginPath();ctx.arc(x+sw/2+12,sy+135,3,0,7);ctx.fill(); }
  } else if(shop.type==='sign'){
    const x=shop.x-cam; if(x>-220&&x<W+40){ const sw=shop.w;
      // stor PLIKTA LEKPARK-skylt på stolpar
      ctx.fillStyle='#6b4423'; ctx.fillRect(x+14,GROUND-150,12,150); ctx.fillRect(x+sw-26,GROUND-150,12,150);
      ctx.fillStyle='#ff8a3d'; ctx.beginPath(); ctx.roundRect(x,GROUND-200,sw,60,12); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.beginPath(); ctx.roundRect(x+6,GROUND-194,sw-12,48,9); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold 26px Comic Sans MS'; ctx.textAlign='center';
      ctx.fillText('🛝 PLIKTA',x+sw/2,GROUND-170); ctx.font='bold 20px Comic Sans MS'; ctx.fillText('LEKPARK',x+sw/2,GROUND-150); }
  }

  ctx.font='42px serif'; ctx.textAlign='center';
  checkpoints.forEach(c=>{ const x=c.x-cam; if(x>-50&&x<W+50)ctx.fillText(c.hit?'🚩':'⚐',x,GROUND-6); });

  // collectibles: glass (bana1) / basket (bana2)
  collects.forEach(s=>{ if(s.got)return; const x=s.x-cam; if(x<-50||x>W+50)return;
    ctx.save(); ctx.translate(x,s.y+Math.sin(s.t)*8);
    if(s.flavor==='ball'){ drawBasketball(ctx,15); }
    else if(s.flavor==='melon'){
      ctx.fillStyle='#6b4423';ctx.fillRect(-2,8,4,16);
      ctx.fillStyle='#2eb85c';ctx.beginPath();ctx.arc(0,0,15,Math.PI,0);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,12,Math.PI,0);ctx.fill();
      ctx.fillStyle='#ff5a6e';ctx.beginPath();ctx.arc(0,0,10,Math.PI,0);ctx.fill();
      ctx.fillStyle='#222';[[-5,-3],[3,-5],[6,-1],[-2,-7]].forEach(k=>{ctx.beginPath();ctx.arc(k[0],k[1],1.3,0,7);ctx.fill();});
    } else {
      ctx.fillStyle='#6b4423';ctx.fillRect(-2,10,4,14);
      ctx.fillStyle='#ff7eb3';ctx.beginPath();ctx.moveTo(-12,-6);ctx.quadraticCurveTo(-14,12,0,14);ctx.quadraticCurveTo(14,12,12,-6);ctx.quadraticCurveTo(0,-16,-12,-6);ctx.fill();
      ctx.fillStyle='#fff3c0';ctx.beginPath();ctx.ellipse(0,2,5,7,0,0,7);ctx.fill();
      ctx.fillStyle='#ffd83d';[[-7,0],[7,1],[-3,-4],[5,-3]].forEach(k=>{ctx.beginPath();ctx.arc(k[0],k[1],1,0,7);ctx.fill();});
    }
    ctx.restore(); });

  // hinder: bajs (bana1) / sandhög (bana2)
  ctx.textAlign='left';
  poops.forEach(o=>{ const x=o.x-cam; if(x<-60||x>W+60)return;
    if(o.sand){ ctx.fillStyle='#c9a85f'; ctx.beginPath(); ctx.moveTo(x,o.y+o.h); ctx.lineTo(x+o.w/2,o.y); ctx.lineTo(x+o.w,o.y+o.h); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#e0c483'; ctx.fillRect(x+o.w/2-2,o.y+3,4,o.h-3); }
    else { ctx.font='44px serif'; ctx.fillText('💩',x,o.y+o.h); } });

  // farts/rapar
  farts.forEach(f=>{ const x=f.x-cam; if(x<-60||x>W+60)return; ctx.save(); ctx.globalAlpha=Math.min(1,f.life);
    const col=f.kind==='burp'?'rgba(111,207,74,0.45)':'rgba(168,224,99,0.4)';
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x+f.w/2,GROUND-14,(f.kind==='burp'?22:18)+Math.sin(f.t*10)*3,0,7); ctx.fill();
    ctx.font=(f.kind==='burp'?'38px':'34px')+' serif'; ctx.textAlign='center';
    ctx.translate(x+f.w/2,GROUND-2+Math.sin(f.t*12)*2); ctx.scale(f.dir,1); ctx.fillText('💨',0,0); ctx.restore(); });

  // fiender
  enemies.forEach(s=>{ const x=s.x-cam; if(x<-90||x>W+90)return;
    if(s.dead){ if(s.deadT<1){ctx.save();ctx.globalAlpha=1-s.deadT;ctx.font='40px serif';ctx.textAlign='center';ctx.fillText('💨',x+s.w/2,s.y+s.h-s.deadT*60);ctx.restore();} return; }
    ctx.save(); ctx.translate(x+s.w/2,s.y+s.h); ctx.scale(-s.dir,1);
    if(s.type==='skunk'){ ctx.font='46px serif'; ctx.textAlign='center'; ctx.fillText('🦨',0,Math.sin(time*10+s.x)*2); }
    else {
      // STOR ritad flodhäst som gapar 🦛
      const bob=Math.sin(time*6+s.x)*2;
      const open=10 + (s.gape>0?16:8) + Math.sin(time*4)*2; // gapar alltid, extra vid rap
      ctx.translate(0,bob);
      // ben
      ctx.fillStyle='#8a6fc0'; [-26,-8,10,26].forEach(lx=>ctx.fillRect(lx-5,8,12,16));
      // kropp
      ctx.fillStyle='#9d7fd4';
      ctx.beginPath(); ctx.ellipse(-6,-8,40,28,0,0,7); ctx.fill();
      // huvud (stort)
      ctx.beginPath(); ctx.ellipse(30,-14,28,24,0,0,7); ctx.fill();
      // öron
      ctx.beginPath(); ctx.arc(18,-36,6,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc(40,-36,6,0,7); ctx.fill();
      // ögon
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(24,-30,6,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(40,-30,6,0,7); ctx.fill();
      ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(25,-30,3,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(41,-30,3,0,7); ctx.fill();
      // STORT GAP (öppen mun)
      ctx.fillStyle='#7a4a8a';
      ctx.beginPath(); ctx.ellipse(46,-4,20,open,0,0,7); ctx.fill();
      ctx.fillStyle='#ff8ab0'; // tunga
      ctx.beginPath(); ctx.ellipse(48,2,12,open*0.4,0,0,7); ctx.fill();
      // tänder
      ctx.fillStyle='#fff';
      ctx.fillRect(36,-4-open,5,7); ctx.fillRect(56,-4-open,5,7);
      ctx.fillRect(38,-2+open,4,6); ctx.fillRect(54,-2+open,4,6);
      // nosborrar
      ctx.fillStyle='#6a4f9a'; ctx.beginPath(); ctx.arc(58,-16,2.5,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(62,-13,2.5,0,7); ctx.fill();
      if(s.gape>0){ ctx.fillStyle='rgba(111,207,74,0.6)'; ctx.beginPath(); ctx.ellipse(72,-4,12,9,0,0,7); ctx.fill(); }
    }
    ctx.restore(); });

  drawBoss();

  // beige lama-spott
  projectiles.forEach(pr=>{ const x=pr.x-cam; ctx.fillStyle='#d8c9a0'; ctx.beginPath(); ctx.arc(x,pr.y,9,0,7); ctx.fill();
    ctx.fillStyle='#c2b189'; ctx.beginPath(); ctx.arc(x-2,pr.y-2,4,0,7); ctx.fill(); });

  // himmelsföremål
  skyItems.forEach(m=>{ const mx=m.x+Math.sin(m.sway)*1.5-cam; if(mx<-50||mx>W+50)return;
    ctx.save(); ctx.translate(mx,m.y);
    if(levelNum===1){ ctx.rotate(Math.sin(m.sway)*0.12); drawMushroom(ctx,24); }
    else { ctx.rotate(m.sway*0.5); drawBasketball(ctx,18); }
    ctx.restore(); });

  drawHero(player.x-cam,player.y);

  frisbees.forEach(fr=>{ const x=fr.x-cam; ctx.save(); ctx.translate(x,fr.y); ctx.rotate(fr.spin);
    ctx.fillStyle='#2f7bff'; ctx.beginPath(); ctx.ellipse(0,0,15,6,0,0,7); ctx.fill();
    ctx.fillStyle='#7fb0ff'; ctx.beginPath(); ctx.ellipse(0,-2,10,3.5,0,0,7); ctx.fill(); ctx.restore(); });

  particles.forEach(pa=>{ ctx.globalAlpha=Math.max(0,pa.life); ctx.fillStyle=pa.c; ctx.beginPath(); ctx.arc(pa.x,pa.y,pa.r,0,7); ctx.fill(); });
  ctx.globalAlpha=1;

  // mål: Karlatornet (bana1) eller mål-stång (bana2)
  if(flag){ const tx=flag.x-cam;
    if(tx>-200&&tx<W+260){
      if(levelNum===1){
        const tw=110,th=340,ty=GROUND-th,tcx=flag.x+tw/2-cam;
        const grad=ctx.createLinearGradient(tx,0,tx+tw,0); grad.addColorStop(0,'#6fb7e8');grad.addColorStop(0.5,'#bfe4fb');grad.addColorStop(1,'#5a9fd4');
        ctx.fillStyle=grad; ctx.beginPath(); ctx.moveTo(tx,GROUND);ctx.lineTo(tx+14,ty);ctx.lineTo(tx+tw-6,ty+10);ctx.lineTo(tx+tw,GROUND);ctx.closePath();ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.55)'; for(let r=0;r<14;r++)for(let c=0;c<4;c++)ctx.fillRect(tx+18+c*22,ty+20+r*22,13,13);
        ctx.fillStyle='#4a7fa5'; ctx.fillRect(tx+12,ty,tw-18,8);
        const poleX=tcx,poleTop=ty-90,poleBot=ty;
        ctx.strokeStyle='#888';ctx.lineWidth=4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(poleX,poleTop);ctx.lineTo(poleX,poleBot);ctx.stroke();
        ctx.fillStyle='#ffd83d';ctx.beginPath();ctx.arc(poleX,poleTop,5,0,7);ctx.fill();
        ctx.fillStyle='#5a3a1a';ctx.font='bold 12px Comic Sans MS';ctx.textAlign='center';ctx.fillText('KARLATORNET',poleX,GROUND-th-100);
        const fy=poleTop+(poleBot-poleTop-40)*(flag.pulled||0);
        ctx.fillStyle=CHARS[heroKey].spider?'#e0342f':'#3fbf5a';
        ctx.beginPath();ctx.moveTo(poleX,fy);ctx.lineTo(poleX+50,fy+8);ctx.lineTo(poleX+50,fy+26);ctx.lineTo(poleX,fy+34);ctx.closePath();ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 13px Comic Sans MS';ctx.fillText(CHARS[heroKey].spider?'🕷️':'👑',poleX+25,fy+24);
      } else {
        // bana 2 mål-stång med klätterställning
        const poleX=flag.x-cam,poleTop=GROUND-260,poleBot=GROUND;
        ctx.strokeStyle='#888';ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(poleX,poleTop);ctx.lineTo(poleX,poleBot);ctx.stroke();
        ctx.fillStyle='#ffd83d';ctx.beginPath();ctx.arc(poleX,poleTop,7,0,7);ctx.fill();
        const fy=poleTop+(poleBot-poleTop-50)*(flag.pulled||0);
        ctx.fillStyle=CHARS[heroKey].spider?'#e0342f':'#3fbf5a';
        ctx.beginPath();ctx.moveTo(poleX,fy);ctx.lineTo(poleX+54,fy+9);ctx.lineTo(poleX+54,fy+30);ctx.lineTo(poleX,fy+40);ctx.closePath();ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 14px Comic Sans MS';ctx.textAlign='center';ctx.fillText(CHARS[heroKey].spider?'🕷️':'👑',poleX+27,fy+27);
        ctx.fillStyle='#5a3a1a';ctx.font='bold 13px Comic Sans MS';ctx.fillText('🛝 MÅL',poleX,poleTop-14);
      }
    }
  }

  if(state==='won'){
    ctx.fillStyle='rgba(255,255,255,0.78)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
    ctx.font='66px serif';ctx.fillText(CHARS[heroKey].spider?'🎉🕷️🎉':'🎉🧢🎉',W/2,140);
    ctx.fillStyle='#ff5a2b';ctx.font='bold 54px Comic Sans MS';ctx.fillText(CHARS[heroKey].name+' VINNER!',W/2,220);
    ctx.fillStyle='#2d5a8a';ctx.font='bold 26px Comic Sans MS';
    ctx.fillText(levelNum===1?'Bajsmonstret spolades ner i toaletten! 🚽💨':'Big Boss Lama är besegrad i Plikta! 🦙🛝',W/2,272);
    ctx.fillText((levelNum===1?'🍦 ':'🏀 ')+'Du samlade '+score+(levelNum===1?' glassar!':' poäng!'),W/2,316);
    if(levelNum===1){ ctx.fillStyle='#3f9c4f';ctx.font='bold 22px Comic Sans MS'; ctx.fillText('Prova Bana 2: Plikta lekpark! 🛝',W/2,356); }
    ctx.fillStyle='#3fbf5a';ctx.font='bold 24px Comic Sans MS';ctx.fillText('Tryck HOPPA för att spela igen!',W/2,394);
    if(keys.j){ makeWorld();respawnX=80;state='menu';overlay.classList.remove('hidden');
      btnL.classList.add('hidden');btnR.classList.add('hidden');btnJ.classList.add('hidden');btnS.classList.add('hidden');drawPreviews(); }
  }
}

let last=0;
function loop(t){ const dt=Math.min((t-last)/1000,0.033); last=t;
  if(state==='play'||state==='winning')update(dt);
  if(state==='won'){ time+=dt; particles.forEach(pa=>{pa.x+=pa.vx;pa.y+=pa.vy;pa.vy+=0.3;pa.life-=dt;}); particles=particles.filter(pa=>pa.life>0); }
  draw(); requestAnimationFrame(loop); }

startBtn.addEventListener('click',()=>{ overlay.classList.add('hidden');
  btnL.classList.remove('hidden');btnR.classList.remove('hidden');btnJ.classList.remove('hidden');btnS.classList.remove('hidden');musicBtn.classList.remove('hidden');
  makeWorld();respawnX=80;state='play';beep(523,0.15,'square',0.1); if(musicOn)startMusic(); });

state='menu'; makeWorld(); requestAnimationFrame(loop);

// ---------- helskärm / mobil-rotation ----------
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
function fitScreen(){
  // rotera ENDAST på riktiga touch-mobiler i stående läge – aldrig på dator
  const portrait = isTouch && window.innerHeight > window.innerWidth;
  document.body.classList.toggle('portrait', portrait);
}
window.addEventListener('resize', fitScreen);
window.addEventListener('orientationchange', ()=>setTimeout(fitScreen,150));
fitScreen();
})();
</script>
</body>
