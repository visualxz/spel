<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PRINCE & NATHAN vs BAJSMONSTRET</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#7ec8ff; font-family:'Comic Sans MS','Chalkboard SE',sans-serif; touch-action:none; }
  #wrap { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  canvas#game { display:block; width:100%; height:100%; object-fit:contain; }
  .btn { position:absolute; bottom:18px; width:84px; height:84px; border-radius:50%; border:4px solid #fff;
    background:rgba(255,255,255,.35); font-size:38px; display:flex; align-items:center; justify-content:center;
    user-select:none; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.3); z-index:5; }
  .btn:active { background:rgba(255,255,255,.65); transform:scale(.93); }
  #left { left:18px; } #right { left:118px; }
  #jump { right:18px; width:104px; height:104px; font-size:26px; background:rgba(255,90,90,.55); font-weight:bold; }
  #shoot { right:134px; bottom:30px; width:84px; height:84px; font-size:34px; background:rgba(90,150,255,.55); }
  #musicBtn { position:absolute; top:10px; right:14px; width:54px; height:54px; border-radius:50%; border:3px solid #fff;
    background:rgba(255,255,255,.4); font-size:26px; display:flex; align-items:center; justify-content:center;
    user-select:none; cursor:pointer; z-index:7; }
  #musicBtn:active { transform:scale(.92); }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#7ec8ff,#b6f0ff); z-index:10; text-align:center; padding:16px; overflow:auto; }
  #overlay h1 { font-size:min(8vw,46px); color:#fff; text-shadow:3px 3px 0 #ff8a3d, 6px 6px 0 rgba(0,0,0,.15); margin-bottom:4px; }
  #overlay p { font-size:min(4.2vw,20px); color:#2d5a8a; margin:4px 0 10px; }
  #chars { display:flex; gap:14px; margin:10px 0 16px; flex-wrap:wrap; justify-content:center; }
  .char { width:140px; padding:12px 8px; border-radius:18px; border:4px solid #fff; cursor:pointer;
    background:rgba(255,255,255,.65); font-family:inherit; font-size:17px; font-weight:bold; color:#2d5a8a; }
  .char canvas { display:block; margin:0 auto 6px; }
  .char.sel { border-color:#ffb53d; background:#fff3c7; transform:scale(1.07); box-shadow:0 4px 12px rgba(0,0,0,.15); }
  #startBtn { font-size:min(7vw,32px); padding:14px 42px; border-radius:50px; border:none; cursor:pointer;
    background:linear-gradient(180deg,#ffd83d,#ffb53d); color:#7a4a00; font-weight:bold; font-family:inherit;
    box-shadow:0 6px 0 #d98e1e; animation:bounce 1s infinite; }
  #startBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #d98e1e; }
  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  .hidden { display:none !important; }
  #hud { position:absolute; top:12px; left:14px; font-size:26px; color:#fff; text-shadow:2px 2px 3px rgba(0,0,0,.35); z-index:4; font-weight:bold; }
  #msg { position:absolute; top:18%; width:100%; text-align:center; font-size:min(8vw,40px); color:#fff;
    text-shadow:3px 3px 0 rgba(0,0,0,.25); z-index:6; pointer-events:none; opacity:0; transition:opacity .3s; font-weight:bold; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="500"></canvas>
  <div id="hud"></div>
  <div id="msg"></div>
  <div id="musicBtn" class="hidden">🎵</div>
  <div id="left" class="btn hidden">◀</div>
  <div id="right" class="btn hidden">▶</div>
  <div id="jump" class="btn hidden">HOPPA!</div>
  <div id="shoot" class="btn hidden">🥏</div>
  <div id="overlay">
    <h1>PRINCE &amp; NATHAN<br>vs BAJSMONSTRET</h1>
    <p>Välj din hjälte! Hoppa över bajset och pruttarna,<br>hoppa PÅ skunkarna – och besegra det STORA BAJSMONSTRET! 💩</p>
    <div id="chars">
      <button class="char sel" data-c="cap"><canvas width="80" height="100"></canvas>PRINCE</button>
      <button class="char" data-c="nathan"><canvas width="80" height="100"></canvas>NATHAN</button>
    </div>
    <p style="font-size:min(3.8vw,16px)">⬅️➡️ = spring &nbsp; | &nbsp; mellanslag = hoppa &nbsp; | &nbsp; F / 🥏 = kasta frisbee</p>
    <button id="startBtn">▶ STARTA!</button>
  </div>
</div>
<script>
(() => {
// roundRect-stöd för äldre webbläsare
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if (typeof r === 'number') r = Math.min(r, w/2, h/2);
    this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r); this.closePath(); return this;
  };
}

const cv = document.getElementById('game'), ctx = cv.getContext('2d');
const W = 900, H = 500, GROUND = 430;
const overlay = document.getElementById('overlay'), startBtn = document.getElementById('startBtn');
const hud = document.getElementById('hud'), msgEl = document.getElementById('msg');
const btnL = document.getElementById('left'), btnR = document.getElementById('right'), btnJ = document.getElementById('jump');
const btnS = document.getElementById('shoot');
const musicBtn = document.getElementById('musicBtn');

// ---------- karaktärer ----------
const CHARS = {
  cap:    { name:'PRINCE', skin:'#eebd8a', shirt:'#3fbf5a', arms:'#3fbf5a', pants:'#3a6bd6', shoes:'#e0342f', hair:'blond', cap:true,  spider:false },
  nathan: { name:'NATHAN', skin:'#5c3317', shirt:'#e0342f', arms:'#e0342f', pants:'#2456c4', shoes:'#1a1a1a', hair:'black', cap:false, spider:true }
};
let heroKey = 'cap';

// ---------- rita figuren (används i spelet OCH i valrutorna) ----------
function renderFigure(g, c, run, arm) {
  run = run||0; arm = arm||0;
  // ben
  g.strokeStyle = c.pants; g.lineWidth = 9; g.lineCap = 'round';
  g.beginPath(); g.moveTo(-7,-26); g.lineTo(-9+run*0.6,-2); g.stroke();
  g.beginPath(); g.moveTo(7,-26); g.lineTo(9-run*0.6,-2); g.stroke();
  // skor
  g.fillStyle = c.shoes;
  g.beginPath(); g.ellipse(-9+run*0.6,-2,8,5,0,0,7); g.fill();
  g.beginPath(); g.ellipse(9-run*0.6,-2,8,5,0,0,7); g.fill();
  // kropp
  g.fillStyle = c.shirt;
  g.beginPath(); g.roundRect(-14,-48,28,26,8); g.fill();
  if (c.spider) {
    // spindelnät på tröjan
    g.strokeStyle = '#1a1a1a'; g.lineWidth = 1.2;
    g.beginPath(); g.moveTo(0,-48); g.lineTo(0,-22); g.stroke();
    g.beginPath(); g.moveTo(-14,-40); g.lineTo(14,-40); g.stroke();
    g.beginPath(); g.moveTo(-14,-31); g.lineTo(14,-31); g.stroke();
    g.beginPath(); g.moveTo(-12,-48); g.lineTo(10,-22); g.stroke();
    g.beginPath(); g.moveTo(12,-48); g.lineTo(-10,-22); g.stroke();
    // spindel på bröstet
    g.fillStyle = '#0d0d0d';
    g.beginPath(); g.ellipse(0,-34,4,6,0,0,7); g.fill();
    g.beginPath(); g.arc(0,-41,2.8,0,7); g.fill();
    g.strokeStyle = '#0d0d0d'; g.lineWidth = 1.4;
    [[-4,-38,-10,-43],[4,-38,10,-43],[-4,-35,-11,-35],[4,-35,11,-35],
     [-4,-31,-10,-27],[4,-31,10,-27]].forEach(seg=>{
      g.beginPath(); g.moveTo(seg[0],seg[1]); g.lineTo(seg[2],seg[3]); g.stroke();
    });
  } else {
    // krona på tröjan
    g.fillStyle = '#ffd83d';
    g.beginPath();
    g.moveTo(-7,-30); g.lineTo(-7,-38); g.lineTo(-3.5,-33); g.lineTo(0,-39);
    g.lineTo(3.5,-33); g.lineTo(7,-38); g.lineTo(7,-30); g.closePath(); g.fill();
  }
  // armar
  g.strokeStyle = c.arms; g.lineWidth = 8; g.lineCap = 'round';
  g.beginPath(); g.moveTo(-13,-44); g.lineTo(-20-arm*0.3,-32+arm*0.4); g.stroke();
  g.beginPath(); g.moveTo(13,-44); g.lineTo(20+arm*0.3,-32-arm*0.4); g.stroke();
  // huvud
  g.fillStyle = c.skin;
  g.beginPath(); g.arc(0,-60,15,0,7); g.fill();
  // hår
  if (c.hair === 'blond') {
    g.fillStyle = '#ffe066';
    if (c.cap) {
      // lockar under kepsen
      [[-15,-62],[-13,-67],[15,-62],[13,-67],[-16,-58]].forEach(cu=>{
        g.beginPath(); g.arc(cu[0],cu[1],5.5,0,7); g.fill();
      });
      // röd keps
      g.fillStyle = '#e0342f';
      g.beginPath(); g.arc(0,-66,15,Math.PI,0); g.fill();
      g.beginPath(); g.roundRect(6,-70,18,6,3); g.fill();
      g.fillStyle = '#b8241f';
      g.beginPath(); g.roundRect(-15,-68,30,4,2); g.fill();
    } else {
      [[-13,-70],[-6,-75],[2,-76],[10,-73],[15,-66],[-16,-63],[6,-78],[-2,-79]].forEach(cu=>{
        g.beginPath(); g.arc(cu[0],cu[1],6.5,0,7); g.fill();
      });
    }
  } else {
    // svart hår (Nathan)
    g.fillStyle = '#1c1008';
    g.beginPath(); g.arc(0,-64,15,Math.PI,0); g.fill();
    g.beginPath(); g.ellipse(0,-68,14,8,0,0,7); g.fill();
    g.beginPath(); g.arc(-14,-60,4,0,7); g.fill();
    g.beginPath(); g.arc(14,-60,4,0,7); g.fill();
  }
  // ansikte
  g.fillStyle = '#222';
  g.beginPath(); g.arc(5,-61,2.2,0,7); g.fill();
  g.beginPath(); g.arc(12,-61,2.2,0,7); g.fill();
  g.strokeStyle = '#c0392b'; g.lineWidth = 2;
  g.beginPath(); g.arc(8,-55,4,0.2,Math.PI-0.2); g.stroke();
}

// rita gubbarna i valrutorna
function drawPreviews() {
  document.querySelectorAll('.char').forEach(b=>{
    const pc = b.querySelector('canvas');
    if (!pc) return;
    try {
      const g = pc.getContext('2d');
      g.clearRect(0,0,pc.width,pc.height);
      g.save();
      g.translate(pc.width/2, pc.height-4);
      renderFigure(g, CHARS[b.dataset.c], 0, 0);
      g.restore();
    } catch(e) { console.error('preview', e); }
  });
}
drawPreviews();
window.addEventListener('load', drawPreviews);

document.querySelectorAll('.char').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.char').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    heroKey = b.dataset.c;
    beep(660,0.1,'square',0.1);
  });
});

// ---------- ljud ----------
let AC = null;
function ensureAC() {
  if (!AC) { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(freq, dur, type, vol, slide) {
  type = type||'sine'; vol = vol===undefined?0.15:vol; slide = slide||0;
  try {
    if (!ensureAC()) return;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    if (slide) o.frequency.linearRampToValueAtTime(freq+slide, AC.currentTime+dur);
    g.gain.value = vol; g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+dur);
  } catch(e){}
}
const sJump = () => beep(300,0.25,'square',0.12,200);
const sStar = () => { beep(880,0.12,'sine',0.15); setTimeout(()=>beep(1320,0.15,'sine',0.15),90); };
const sOops = () => beep(220,0.4,'sawtooth',0.12,-120);
const sBoop = () => beep(500,0.18,'triangle',0.18,300);
const sWin  = () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.3,'square',0.13),i*160)); };
const sFart = () => { beep(110,0.3,'sawtooth',0.16,-50); setTimeout(()=>beep(85,0.22,'sawtooth',0.13,-30),120); };
const sThrow = () => beep(620,0.18,'square',0.12,400);

// ---------- AFROBEAT-MUSIK 🎵 ----------
let musicOn = true, musicTimer = null, musicGain = null, nextNote = 0, mStep = 0;
const TEMPO = 106, STEP_T = 60/TEMPO/4; // sextondelar

function mTone(freq, t, dur, type, vol, dest) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t+0.008);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(dest);
  o.start(t); o.stop(t+dur+0.05);
}
function mKick(t) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(140, t);
  o.frequency.exponentialRampToValueAtTime(45, t+0.1);
  g.gain.setValueAtTime(0.9, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.16);
  o.connect(g); g.connect(musicGain);
  o.start(t); o.stop(t+0.2);
}
function mShaker(t, vol) {
  const len = 0.05, buf = AC.createBuffer(1, AC.sampleRate*len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1-i/d.length);
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=6000;
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(f); f.connect(g); g.connect(musicGain);
  src.start(t);
}
function mRim(t) {
  mTone(1750, t, 0.045, 'square', 0.18, musicGain);
}
// A-moll-pentatonisk afrogroove, 2 takter (32 steg)
const BASS = {0:55,3:55,6:65.4,10:82.4,14:49,16:55,19:55,22:73.4,26:82.4,30:65.4};
const MEL  = {2:329.6,5:392,8:440,13:392,18:329.6,21:293.7,24:261.6,29:220};
const KICK = [0,6,10];
const RIM  = [4,12,14];

function scheduleStep(s, t) {
  const bs = s % 16;
  if (KICK.indexOf(bs) > -1) mKick(t);
  if (s % 2 === 1) mShaker(t, bs % 4 === 3 ? 0.3 : 0.15);
  if (RIM.indexOf(bs) > -1 && (s<16 ? bs!==14 : true)) mRim(t);
  if (BASS[s] !== undefined) mTone(BASS[s], t, 0.22, 'triangle', 0.65, musicGain);
  if (MEL[s]  !== undefined) {
    mTone(MEL[s], t, 0.3, 'sine', 0.3, musicGain);
    mTone(MEL[s]*2, t, 0.12, 'triangle', 0.1, musicGain); // marimba-glans
  }
}
function musicTick() {
  if (!AC || !musicGain) return;
  while (nextNote < AC.currentTime + 0.15) {
    scheduleStep(mStep % 32, nextNote);
    nextNote += STEP_T;
    mStep++;
  }
}
function startMusic() {
  if (!ensureAC() || musicTimer) return;
  musicGain = AC.createGain();
  musicGain.gain.value = 0.07; // lagom lågt i bakgrunden
  musicGain.connect(AC.destination);
  nextNote = AC.currentTime + 0.05; mStep = 0;
  musicTimer = setInterval(musicTick, 40);
}
function stopMusic() {
  if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
  if (musicGain) { try { musicGain.disconnect(); } catch(e){} musicGain = null; }
}
musicBtn.addEventListener('click', () => {
  musicOn = !musicOn;
  musicBtn.textContent = musicOn ? '🎵' : '🔇';
  if (musicOn) startMusic(); else stopMusic();
});

// ---------- input ----------
const keys = { l:false, r:false, j:false, s:false };
addEventListener('keydown', e => {
  if (e.code==='ArrowLeft') keys.l=true;
  if (e.code==='ArrowRight') keys.r=true;
  if (e.code==='Space'||e.code==='ArrowUp') { keys.j=true; e.preventDefault(); }
  if (e.code==='KeyF') { keys.s=true; e.preventDefault(); }
});
addEventListener('keyup', e => {
  if (e.code==='ArrowLeft') keys.l=false;
  if (e.code==='ArrowRight') keys.r=false;
  if (e.code==='Space'||e.code==='ArrowUp') keys.j=false;
  if (e.code==='KeyF') keys.s=false;
});
function bindBtn(el, prop) {
  const on = e => { e.preventDefault(); keys[prop]=true; };
  const off = e => { e.preventDefault(); keys[prop]=false; };
  el.addEventListener('pointerdown', on);
  el.addEventListener('pointerup', off);
  el.addEventListener('pointerleave', off);
  el.addEventListener('pointercancel', off);
}
bindBtn(btnL,'l'); bindBtn(btnR,'r'); bindBtn(btnJ,'j'); bindBtn(btnS,'s');

// ---------- värld ----------
const LEVEL_END = 5600;
let player, cam, stars, poops, skunks, platforms, checkpoints, boss, particles, clouds, farts, frisbees, flowers, shop;
let score, state, msgTimer, time=0, invuln=0, jumpHeld=false, shootHeld=false, shootCD=0;

function makeWorld() {
  player = { x:80, y:GROUND-70, w:44, h:70, vx:0, vy:0, onGround:false, face:1, squash:1 };
  cam = 0; score = 0; invuln = 0;
  stars = [];
  [400,700,1000,1250,1500,1850,2200,2500,2750,3100,3450,3800,4100,4400,4700,5000].forEach(x=>{
    stars.push({x, y: GROUND-120-((x/250|0)%3)*55, got:false, t:Math.random()*6});
  });
  poops = [550,900,1350,1700,2050,2400,2850,3250,3650,4050,4450,4850].map(x=>({x, y:GROUND-34, w:46, h:34}));
  skunks = [
    {x:1150,min:1050,max:1350},{x:2300,min:2150,max:2550},
    {x:3000,min:2900,max:3200},{x:3900,min:3750,max:4150},{x:4650,min:4550,max:4800}
  ].map(s=>({...s, y:GROUND-40, w:52, h:40, dir:1, dead:false, deadT:0, fartT:2+Math.random()*4}));
  platforms = [
    {x:780,y:GROUND-110,w:130,h:24},{x:1550,y:GROUND-120,w:140,h:24},
    {x:2650,y:GROUND-115,w:130,h:24},{x:3500,y:GROUND-125,w:150,h:24},
    {x:4250,y:GROUND-110,w:130,h:24}
  ];
  checkpoints = [{x:1900,hit:false},{x:3700,hit:false}];
  // lila studs-blommor (svampblommor) man hoppar upp på
  flowers = [1000,1750,2600,3550,4300].map(x=>({x, y:GROUND-20, bounce:0}));
  // godisaffär KVILLETORGET att äta vid
  shop = { x:2950, w:240, ate:false };
  frisbees = [];
  boss = { x:5350, y:GROUND-130, w:130, h:130, hp:3, vx:0, vy:0, onGround:true, hurt:0, dir:-1, jumpT:2, dead:false, deadT:0, size:1 };
  particles = []; farts = [];
  clouds = Array.from({length:14},(_,i)=>({x:i*450+Math.random()*200, y:40+Math.random()*120, s:0.7+Math.random()*0.8}));
}

let respawnX = 80;
function showMsg(t, ms) {
  ms = ms||1400;
  msgEl.textContent = t; msgEl.style.opacity = 1;
  clearTimeout(msgTimer);
  msgTimer = setTimeout(()=>msgEl.style.opacity=0, ms);
}
function emit(x,y,n,colors,spread,up) {
  spread = spread||6; up = up||8;
  for (let i=0;i<n;i++) particles.push({
    x,y, vx:(Math.random()-0.5)*spread, vy:-Math.random()*up-2,
    c:colors[Math.random()*colors.length|0], r:3+Math.random()*5, life:1
  });
}

function drawHero(px, py) {
  const p = player, c = CHARS[heroKey];
  ctx.save();
  ctx.translate(px+p.w/2, py+p.h);
  ctx.scale(p.face, 1);
  ctx.scale(1/Math.sqrt(p.squash), p.squash);
  if (invuln>0 && Math.floor(time*12)%2===0) ctx.globalAlpha = 0.4;
  const run = p.onGround && Math.abs(p.vx)>0.5 ? Math.sin(time*16)*8 : 0;
  const arm = p.onGround ? run*0.5 : -10;
  renderFigure(ctx, c, run, arm);
  ctx.restore();
}

function drawBoss() {
  if (boss.dead && boss.deadT > 2.2) return;
  const bx = boss.x - cam, by = boss.y;
  ctx.save();
  ctx.translate(bx+boss.w/2, by+boss.h);
  let sz = boss.size;
  if (boss.hurt>0) sz *= 1 - Math.sin(boss.hurt*20)*0.08;
  if (boss.dead) sz *= Math.max(0, 1-boss.deadT/2);
  ctx.scale(sz, sz);
  const wob = Math.sin(time*4)*3;
  ctx.font = '130px serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('💩', 0, 10+wob*0.3);
  ctx.strokeStyle = '#4a2c12'; ctx.lineWidth = 7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-42,-78+wob); ctx.lineTo(-16,-66+wob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(42,-78+wob); ctx.lineTo(16,-66+wob); ctx.stroke();
  ctx.restore();
  if (!boss.dead) {
    ctx.font = '26px serif'; ctx.textAlign='center';
    for (let i=0;i<boss.hp;i++) ctx.fillText('💜', bx+boss.w/2-32+i*32, by-20);
    ctx.font = 'bold 18px Comic Sans MS, sans-serif'; ctx.fillStyle='#5a3a1a';
    ctx.fillText('BAJSMONSTRET', bx+boss.w/2, by-50);
  }
}

// ---------- uppdatering ----------
function respawn() {
  sOops();
  emit(player.x-cam+player.w/2, player.y+player.h/2, 14, ['#8a5a2b','#b07a3f','#fff']);
  const fun = ['Oj då! 💨','Usch! 😝','Hoppsan! Försök igen!','Nästan! Du klarar det! 💪'];
  showMsg(fun[Math.random()*fun.length|0]);
  // backa bara en liten bit – inte hela vägen tillbaka
  player.x = Math.max(40, player.x - 150);
  player.y = GROUND-200; player.vx=0; player.vy=0;
  invuln = 2;
}

function update(dt) {
  time += dt;
  if (invuln>0) invuln -= dt;
  const p = player;
  const sp = 4.6;
  if (keys.l) { p.vx = -sp; p.face = -1; }
  else if (keys.r) { p.vx = sp; p.face = 1; }
  else p.vx *= 0.7;
  if (keys.j && p.onGround && !jumpHeld) { p.vy = -17.5; p.onGround = false; sJump(); p.squash = 1.25; }
  jumpHeld = keys.j;
  // kasta blå frisbee
  if (shootCD>0) shootCD -= dt;
  if (keys.s && !shootHeld && shootCD<=0) {
    frisbees.push({ x:p.x+p.w/2, y:p.y+30, dir:p.face, t:0, spin:0 });
    shootCD = 0.35; sThrow();
  }
  shootHeld = keys.s;
  p.vy += 38*dt; if (p.vy>18) p.vy=18;
  p.x += p.vx; p.y += p.vy;
  if (p.x < 0) p.x = 0;
  p.squash += (1-p.squash)*0.15;

  p.onGround = false;
  if (p.y + p.h >= GROUND) { p.y = GROUND-p.h; if (p.vy>6) p.squash=0.75; p.vy=0; p.onGround=true; }
  platforms.forEach(pl=>{
    if (p.vy>=0 && p.x+p.w>pl.x+6 && p.x<pl.x+pl.w-6 &&
        p.y+p.h>=pl.y && p.y+p.h<=pl.y+22) {
      p.y = pl.y-p.h; p.vy=0; p.onGround=true;
    }
  });

  // lila studs-blommor – hoppa upp på dem för en extra-studs!
  flowers.forEach(fl=>{
    if (fl.bounce>0) fl.bounce -= dt*4;
    const top = fl.y - 18;
    if (p.vy>0 && p.x+p.w-10>fl.x-26 && p.x+10<fl.x+26 &&
        p.y+p.h>=top && p.y+p.h<=top+26) {
      p.y = top-p.h; p.vy = -21; p.onGround=false; fl.bounce=1; sBoop();
      emit(fl.x-cam, top, 8, ['#c77dff','#e0aaff','#fff']);
    }
  });

  // godisaffär KVILLETORGET – ät godis när man går förbi
  if (!shop.ate && p.x+p.w>shop.x && p.x<shop.x+shop.w) {
    shop.ate = true; score += 5; sStar();
    showMsg('MUMS! Godis från KVILLETORGET! 🍭🍬 +5', 1600);
    emit(p.x-cam+p.w/2, p.y+20, 16, ['#ff8ae0','#ffd83d','#7ec8ff','#ff5a5a']);
  }

  stars.forEach(s=>{
    s.t += dt*3;
    if (!s.got && Math.abs(p.x+p.w/2-s.x)<34 && Math.abs(p.y+p.h/2-(s.y+Math.sin(s.t)*8))<44) {
      s.got = true; score++; sStar();
      emit(s.x-cam, s.y, 10, ['#ffd83d','#fff','#ffb53d']);
      if (score%5===0) showMsg('Bra jobbat! ⭐ '+score, 1000);
    }
  });

  checkpoints.forEach(c=>{
    if (!c.hit && p.x > c.x) { c.hit = true; respawnX = c.x; showMsg('Checkpoint! 🚩',1000); sBoop(); }
  });

  if (invuln<=0) poops.forEach(o=>{
    if (p.x+p.w-8>o.x && p.x+8<o.x+o.w && p.y+p.h>o.y+8) respawn();
  });

  skunks.forEach(s=>{
    if (s.dead) { s.deadT += dt; return; }
    s.x += s.dir * 1.4;
    if (s.x<s.min||s.x>s.max) s.dir*=-1;
    const dist = Math.abs(p.x - s.x);
    if (dist < 650) {
      s.fartT -= dt;
      if (s.fartT <= 0) {
        s.fartT = 3.5 + Math.random()*3;
        const fdir = p.x < s.x ? -1 : 1;
        farts.push({ x: s.x + (fdir>0 ? s.w : -10), y: GROUND-26, w:30, h:24, dir:fdir, life:4, t:0 });
        emit(s.x-cam+s.w/2, s.y+s.h-6, 6, ['#a8e063','#c7f08a','#8fd14f'], 4, 4);
        if (dist < 550) sFart();
      }
    }
    const hitX = p.x+p.w-8>s.x && p.x+8<s.x+s.w;
    const stomp = hitX && p.vy>2 && p.y+p.h>s.y && p.y+p.h<s.y+26;
    if (stomp) {
      s.dead = true; p.vy = -10; sBoop(); score+=2;
      emit(s.x-cam+s.w/2, s.y, 12, ['#fff','#222','#aaa']);
      showMsg('Boing! 🦨💨', 900);
    } else if (invuln<=0 && hitX && p.y+p.h>s.y+10 && p.y<s.y+s.h) respawn();
  });

  farts.forEach(f=>{
    f.x += f.dir * 2.6;
    f.t += dt; f.life -= dt;
    if (invuln<=0 && f.life>0 &&
        p.x+p.w-10>f.x && p.x+10<f.x+f.w &&
        p.y+p.h>GROUND-f.h-4) {
      f.life = 0;
      respawn();
      showMsg('Usch, en prutt! 💨🤢');
    }
  });
  farts = farts.filter(f=>f.life>0);

  // frisbees flyger och slår ut skunkar (och skadar bossen)
  frisbees.forEach(fr=>{
    fr.x += fr.dir * 8.5; fr.t += dt; fr.spin += dt*20;
    skunks.forEach(s=>{
      if (!s.dead && Math.abs(fr.x-(s.x+s.w/2))<32 && Math.abs(fr.y-(s.y+s.h/2))<34) {
        s.dead = true; fr.t = 99; score += 2; sBoop();
        emit(s.x-cam+s.w/2, s.y, 12, ['#5a96ff','#fff','#222']);
        showMsg('PANG! 🥏🦨', 800);
      }
    });
    if (!boss.dead && boss.hurt<=0 && fr.x>boss.x+15 && fr.x<boss.x+boss.w-15 &&
        fr.y>boss.y && fr.y<boss.y+boss.h) {
      fr.t = 99; boss.hp--; boss.hurt=0.8; boss.size*=0.85; sBoop();
      emit(boss.x-cam+boss.w/2, boss.y+30, 14, ['#5a96ff','#8a5a2b','#fff']);
      if (boss.hp<=0) { boss.dead=true; state='winning'; sWin(); showMsg('PFFFFT! 💨🚽',1500); }
      else showMsg('PANG! 🥏', 800);
    }
  });
  frisbees = frisbees.filter(fr=> fr.t<3 && fr.x>cam-60 && fr.x<cam+W+60);

  if (!boss.dead) {
    boss.jumpT -= dt;
    const near = p.x > boss.x-450;
    if (near) {
      boss.x += boss.dir*1.1;
      if (boss.x < 5150) boss.dir = 1;
      if (boss.x > 5470) boss.dir = -1;
      if (boss.jumpT<=0 && boss.onGround) { boss.vy=-9; boss.onGround=false; boss.jumpT=1.6+Math.random()*1.4; }
    }
    boss.vy += 30*dt; boss.y += boss.vy;
    if (boss.y+boss.h>=GROUND) { boss.y=GROUND-boss.h; boss.vy=0; boss.onGround=true; }
    if (boss.hurt>0) boss.hurt-=dt;
    const hb = { x:boss.x+15, w:boss.w-30 };
    const hitX = p.x+p.w-6>hb.x && p.x+6<hb.x+hb.w;
    const stomp = hitX && p.vy>2 && p.y+p.h>boss.y && p.y+p.h<boss.y+50;
    if (stomp && boss.hurt<=0) {
      boss.hp--; boss.hurt=0.8; boss.size*=0.85; p.vy=-12; sBoop();
      emit(boss.x-cam+boss.w/2, boss.y+30, 16, ['#8a5a2b','#b07a3f','#6b4423']);
      const t = ['SPLAT! 💥','Igen! 💪','En gång till!'];
      showMsg(boss.hp>0 ? t[3-boss.hp-1]||'SPLAT!' : '', 1000);
      if (boss.hp<=0) {
        boss.dead = true; state='winning'; sWin();
        showMsg('PFFFFT! 💨🚽', 1500);
      }
    } else if (invuln<=0 && !stomp && hitX && p.y+p.h>boss.y+40 && p.y<boss.y+boss.h && boss.hurt<=0) respawn();
  } else {
    boss.deadT += dt;
    if (boss.deadT<2) emit(boss.x-cam+boss.w/2, boss.y+boss.h/2, 2, ['#8a5a2b','#fff','#7ec8ff']);
    if (boss.deadT>2.5 && state==='winning') {
      state='won'; sWin();
      for (let i=0;i<5;i++) setTimeout(()=>{
        emit(200+Math.random()*500, 100+Math.random()*150, 25, ['#ff5a5a','#ffd83d','#3fbf5a','#5a8aff','#ff8ae0'], 10, 12);
      }, i*350);
    }
  }

  particles.forEach(pa=>{ pa.x+=pa.vx; pa.y+=pa.vy; pa.vy+=0.35; pa.life-=dt*1.2; });
  particles = particles.filter(pa=>pa.life>0);

  cam += ((p.x - 280) - cam)*0.1;
  if (cam<0) cam=0;
  if (cam>LEVEL_END-W+100) cam=LEVEL_END-W+100;

  hud.textContent = '⭐ ' + score;
}

// ---------- rendering ----------
function draw() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#7ec8ff'); g.addColorStop(1,'#c8f0ff');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.font='60px serif'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText('🌞', 790, 80);
  ctx.font='50px serif';
  clouds.forEach(c=>{ const x=(c.x-cam*0.4)%(LEVEL_END); if(x>-80&&x<W+80) { ctx.save(); ctx.translate(x,c.y); ctx.scale(c.s,c.s); ctx.fillText('☁️',0,0); ctx.restore(); }});
  ctx.fillStyle = '#a8e063';
  for (let i=0;i<8;i++) {
    const hx = (i*900 - cam*0.6)%(LEVEL_END);
    ctx.beginPath(); ctx.arc(hx, GROUND+60, 160, Math.PI, 0); ctx.fill();
  }
  ctx.fillStyle = '#5fc24e'; ctx.fillRect(0, GROUND, W, H-GROUND);
  ctx.fillStyle = '#8a5a2b'; ctx.fillRect(0, GROUND+22, W, H-GROUND);
  ctx.font='22px serif';
  for (let i=0;i<40;i++) {
    const fx = i*150 - cam; if (fx>-30&&fx<W+30) ctx.fillText(['🌸','🌼','🌷'][i%3], fx, GROUND+18);
  }
  platforms.forEach(pl=>{
    const x = pl.x-cam; if (x<-200||x>W+200) return;
    ctx.fillStyle = '#c98a3e'; ctx.beginPath(); ctx.roundRect(x,pl.y,pl.w,pl.h,8); ctx.fill();
    ctx.fillStyle = '#5fc24e'; ctx.beginPath(); ctx.roundRect(x,pl.y,pl.w,10,6); ctx.fill();
  });
  ctx.font='42px serif';
  checkpoints.forEach(c=>{ const x=c.x-cam; if(x>-50&&x<W+50) ctx.fillText(c.hit?'🚩':'⚐', x, GROUND-6); });

  // godisaffär KVILLETORGET
  (function(){
    const x = shop.x-cam; if (x<-260||x>W+40) return;
    const sw = shop.w, sh = 150, sy = GROUND-sh;
    // husvägg
    ctx.fillStyle = '#ffe0ec'; ctx.fillRect(x, sy, sw, sh);
    // randig markis
    for (let i=0;i<sw/26;i++){ ctx.fillStyle = i%2?'#ff5a8a':'#fff'; ctx.fillRect(x+i*26, sy, 26, 22); }
    // skylt
    ctx.fillStyle = '#7a2d52'; ctx.beginPath(); ctx.roundRect(x+10, sy-40, sw-20, 34, 8); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font='bold 22px Comic Sans MS, sans-serif'; ctx.textAlign='center';
    ctx.fillText('🍭 KVILLETORGET 🍬', x+sw/2, sy-15);
    // fönster med godis
    ctx.fillStyle = '#bfe9ff'; ctx.fillRect(x+20, sy+34, sw-40, 70);
    ctx.font='30px serif'; ctx.textAlign='left';
    ['🍬','🍭','🍫','🧁','🍩','🍡'].forEach((e,i)=> ctx.fillText(e, x+30+i*((sw-60)/6), sy+78));
    // dörr
    ctx.fillStyle = '#7a4a2b'; ctx.fillRect(x+sw/2-22, sy+110, 44, sh-110);
    ctx.fillStyle = '#ffd83d'; ctx.beginPath(); ctx.arc(x+sw/2+12, sy+135, 3, 0, 7); ctx.fill();
  })();

  // lila studs-blommor
  flowers.forEach(fl=>{
    const x = fl.x-cam; if (x<-50||x>W+50) return;
    const squish = fl.bounce>0 ? fl.bounce*6 : 0;
    // stjälk
    ctx.strokeStyle='#3f9c4f'; ctx.lineWidth=6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x, GROUND); ctx.lineTo(x, fl.y-6+squish); ctx.stroke();
    // rund lila kudde
    ctx.fillStyle='#9d4edd';
    ctx.beginPath(); ctx.ellipse(x, fl.y-16+squish, 28, 18-squish*0.5, 0, 0, 7); ctx.fill();
    ctx.fillStyle='#c77dff';
    ctx.beginPath(); ctx.ellipse(x, fl.y-20+squish, 22, 13-squish*0.4, 0, 0, 7); ctx.fill();
    // rosa prickar
    ctx.fillStyle='#ff9ed8';
    [[-12,-2],[8,-4],[0,2],[-4,-8],[13,3]].forEach(d=>{
      ctx.beginPath(); ctx.arc(x+d[0], fl.y-18+d[1]+squish, 3.2, 0, 7); ctx.fill();
    });
  });

  stars.forEach(s=>{
    if (s.got) return;
    const x = s.x-cam; if (x<-50||x>W+50) return;
    ctx.save(); ctx.translate(x, s.y+Math.sin(s.t)*8);
    ctx.font='34px serif'; ctx.textAlign='center'; ctx.fillText('⭐',0,12); ctx.restore();
  });
  ctx.font='44px serif'; ctx.textAlign='left';
  poops.forEach(o=>{ const x=o.x-cam; if(x>-60&&x<W+60) ctx.fillText('💩', x, o.y+o.h); });
  farts.forEach(f=>{
    const x = f.x-cam; if (x<-60||x>W+60) return;
    ctx.save();
    ctx.globalAlpha = Math.min(1, f.life);
    ctx.fillStyle = 'rgba(168,224,99,0.4)';
    ctx.beginPath(); ctx.arc(x+f.w/2, GROUND-14, 18+Math.sin(f.t*10)*3, 0, 7); ctx.fill();
    ctx.font='34px serif'; ctx.textAlign='center';
    ctx.translate(x+f.w/2, GROUND-2+Math.sin(f.t*12)*2);
    ctx.scale(f.dir,1);
    ctx.fillText('💨', 0, 0);
    ctx.restore();
  });
  skunks.forEach(s=>{
    const x = s.x-cam; if (x<-80||x>W+80) return;
    if (s.dead) {
      if (s.deadT<1) { ctx.save(); ctx.globalAlpha=1-s.deadT; ctx.font='40px serif'; ctx.fillText('💨', x, s.y+s.h-s.deadT*60); ctx.restore(); }
      return;
    }
    ctx.save(); ctx.translate(x+s.w/2, s.y+s.h);
    ctx.scale(-s.dir,1);
    ctx.font='46px serif'; ctx.textAlign='center';
    ctx.fillText('🦨', 0, Math.sin(time*10+s.x)*2);
    ctx.restore();
  });
  drawBoss();
  if (boss.dead && boss.deadT>1.5) {
    ctx.font='90px serif'; ctx.textAlign='center';
    ctx.fillText('🚽', boss.x-cam+boss.w/2, GROUND);
    if (boss.deadT<2.5) ctx.fillText('💨', boss.x-cam+boss.w/2, GROUND-80);
  }
  drawHero(player.x-cam, player.y);
  // blå frisbees
  frisbees.forEach(fr=>{
    const x = fr.x-cam;
    ctx.save(); ctx.translate(x, fr.y); ctx.rotate(fr.spin);
    ctx.fillStyle = '#2f7bff';
    ctx.beginPath(); ctx.ellipse(0,0,15,6,0,0,7); ctx.fill();
    ctx.fillStyle = '#7fb0ff';
    ctx.beginPath(); ctx.ellipse(0,-2,10,3.5,0,0,7); ctx.fill();
    ctx.restore();
  });
  particles.forEach(pa=>{
    ctx.globalAlpha = Math.max(0,pa.life);
    ctx.fillStyle = pa.c;
    ctx.beginPath(); ctx.arc(pa.x, pa.y, pa.r, 0, 7); ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (state==='won') {
    ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.font='70px serif'; ctx.fillText(CHARS[heroKey].spider ? '🎉🕷️🎉' : '🎉🧢🎉', W/2, 150);
    ctx.fillStyle='#ff5a2b'; ctx.font='bold 56px Comic Sans MS, sans-serif';
    ctx.fillText(CHARS[heroKey].name + ' VINNER!', W/2, 230);
    ctx.fillStyle='#2d5a8a'; ctx.font='bold 30px Comic Sans MS, sans-serif';
    ctx.fillText('Bajsmonstret spolades ner i toaletten! 🚽💨', W/2, 285);
    ctx.fillText('⭐ Du samlade ' + score + ' stjärnor!', W/2, 330);
    ctx.fillStyle='#3fbf5a'; ctx.font='bold 26px Comic Sans MS, sans-serif';
    ctx.fillText('Tryck HOPPA eller mellanslag för att spela igen!', W/2, 395);
    if (keys.j) {
      makeWorld(); respawnX=80; state='menu';
      overlay.classList.remove('hidden');
      btnL.classList.add('hidden'); btnR.classList.add('hidden'); btnJ.classList.add('hidden'); btnS.classList.add('hidden');
      drawPreviews();
    }
  }
}

// ---------- loop ----------
let last = 0;
function loop(t) {
  const dt = Math.min((t-last)/1000, 0.033); last = t;
  if (state==='play'||state==='winning') update(dt);
  if (state==='won') { time+=dt; particles.forEach(pa=>{pa.x+=pa.vx;pa.y+=pa.vy;pa.vy+=0.3;pa.life-=dt;}); particles=particles.filter(pa=>pa.life>0); }
  draw();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  btnL.classList.remove('hidden'); btnR.classList.remove('hidden'); btnJ.classList.remove('hidden');
  btnS.classList.remove('hidden');
  musicBtn.classList.remove('hidden');
  makeWorld(); respawnX = 80; state = 'play';
  beep(523,0.15,'square',0.1);
  if (musicOn) startMusic();
});

state = 'menu';
makeWorld();
requestAnimationFrame(loop);
})();
</script>
