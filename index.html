<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PRINCE & Bajsmonstret</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#7ec8ff; font-family:'Comic Sans MS','Chalkboard SE',sans-serif; touch-action:none; }
  #wrap { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; width:100%; height:100%; object-fit:contain; }
  .btn { position:absolute; bottom:18px; width:84px; height:84px; border-radius:50%; border:4px solid #fff;
    background:rgba(255,255,255,.35); font-size:38px; display:flex; align-items:center; justify-content:center;
    user-select:none; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.3); z-index:5; }
  .btn:active { background:rgba(255,255,255,.65); transform:scale(.93); }
  #left { left:18px; } #right { left:118px; }
  #jump { right:18px; width:104px; height:104px; font-size:26px; background:rgba(255,90,90,.55); font-weight:bold; }
  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#7ec8ff,#b6f0ff); z-index:10; text-align:center; padding:20px; }
  #overlay h1 { font-size:min(11vw,58px); color:#fff; text-shadow:3px 3px 0 #ff8a3d, 6px 6px 0 rgba(0,0,0,.15); margin-bottom:8px; }
  #overlay p { font-size:min(5vw,24px); color:#2d5a8a; margin:6px 0 18px; }
  #startBtn { font-size:min(7vw,34px); padding:16px 44px; border-radius:50px; border:none; cursor:pointer;
    background:linear-gradient(180deg,#ffd83d,#ffb53d); color:#7a4a00; font-weight:bold; font-family:inherit;
    box-shadow:0 6px 0 #d98e1e; animation:bounce 1s infinite; }
  #startBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #d98e1e; }
  @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  .hidden { display:none !important; }
  #hud { position:absolute; top:12px; left:14px; font-size:26px; color:#fff; text-shadow:2px 2px 3px rgba(0,0,0,.35); z-index:4; font-weight:bold; }
  #msg { position:absolute; top:18%; width:100%; text-align:center; font-size:min(8vw,40px); color:#fff;
    text-shadow:3px 3px 0 rgba(0,0,0,.25); z-index:6; pointer-events:none; opacity:0; transition:opacity .3s; font-weight:bold; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="500"></canvas>
  <div id="hud"></div>
  <div id="msg"></div>
  <div id="left" class="btn hidden">◀</div>
  <div id="right" class="btn hidden">▶</div>
  <div id="jump" class="btn hidden">HOPPA!</div>
  <div id="overlay">
    <div style="font-size:min(16vw,80px)">👦💨💩</div>
    <h1>PRINCE &amp; BAJSMONSTRET</h1>
    <p>Hjälp Prince hoppa över bajset, akta dig för skunkarna<br>och deras pruttar – och besegra det STORA BAJSMONSTRET! 🦨💨💩</p>
    <p style="font-size:min(4vw,18px)">⬅️➡️ = spring &nbsp; | &nbsp; mellanslag / HOPPA = hoppa<br>Hoppa PÅ skunkar och monstret – hoppa ÖVER pruttarna!</p>
    <button id="startBtn">▶ STARTA!</button>
  </div>
</div>
<script>
(() => {
const cv = document.getElementById('game'), ctx = cv.getContext('2d');
const W = 900, H = 500, GROUND = 430;
const overlay = document.getElementById('overlay'), startBtn = document.getElementById('startBtn');
const hud = document.getElementById('hud'), msgEl = document.getElementById('msg');
const btnL = document.getElementById('left'), btnR = document.getElementById('right'), btnJ = document.getElementById('jump');

// ---------- ljud ----------
let AC = null;
function beep(freq, dur, type='sine', vol=0.15, slide=0) {
  try {
    if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    if (slide) o.frequency.linearRampToValueAtTime(freq+slide, AC.currentTime+dur);
    g.gain.value = vol; g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+dur);
  } catch(e){}
}
const sJump = () => beep(300,0.25,'square',0.12,200);
const sStar = () => { beep(880,0.12,'sine',0.15); setTimeout(()=>beep(1320,0.15,'sine',0.15),90); };
const sOops = () => beep(220,0.4,'sawtooth',0.12,-120);
const sBoop = () => beep(500,0.18,'triangle',0.18,300);
const sWin  = () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.3,'square',0.13),i*160)); };
const sFart = () => { beep(110,0.3,'sawtooth',0.16,-50); setTimeout(()=>beep(85,0.22,'sawtooth',0.13,-30),120); };

// ---------- input ----------
const keys = { l:false, r:false, j:false };
addEventListener('keydown', e => {
  if (e.code==='ArrowLeft') keys.l=true;
  if (e.code==='ArrowRight') keys.r=true;
  if (e.code==='Space'||e.code==='ArrowUp') { keys.j=true; e.preventDefault(); }
});
addEventListener('keyup', e => {
  if (e.code==='ArrowLeft') keys.l=false;
  if (e.code==='ArrowRight') keys.r=false;
  if (e.code==='Space'||e.code==='ArrowUp') keys.j=false;
});
function bindBtn(el, prop) {
  const on = e => { e.preventDefault(); keys[prop]=true; };
  const off = e => { e.preventDefault(); keys[prop]=false; };
  el.addEventListener('pointerdown', on);
  el.addEventListener('pointerup', off);
  el.addEventListener('pointerleave', off);
  el.addEventListener('pointercancel', off);
}
bindBtn(btnL,'l'); bindBtn(btnR,'r'); bindBtn(btnJ,'j');

// ---------- värld ----------
const LEVEL_END = 5600;
let player, cam, stars, poops, skunks, platforms, checkpoints, boss, particles, clouds, farts;
let score, state, msgTimer, time=0, invuln=0, jumpHeld=false;

function makeWorld() {
  player = { x:80, y:GROUND-70, w:44, h:70, vx:0, vy:0, onGround:false, face:1, squash:1 };
  cam = 0; score = 0; invuln = 0;
  stars = [];
  [400,700,1000,1250,1500,1850,2200,2500,2750,3100,3450,3800,4100,4400,4700,5000].forEach(x=>{
    stars.push({x, y: GROUND-120-((x/250|0)%3)*55, got:false, t:Math.random()*6});
  });
  poops = [550,900,1350,1700,2050,2400,2850,3250,3650,4050,4450,4850].map(x=>({x, y:GROUND-34, w:46, h:34}));
  skunks = [
    {x:1150,min:1050,max:1350},{x:2300,min:2150,max:2550},
    {x:3000,min:2900,max:3200},{x:3900,min:3750,max:4150},{x:4650,min:4550,max:4800}
  ].map(s=>({...s, y:GROUND-40, w:52, h:40, dir:1, dead:false, deadT:0, fartT:2+Math.random()*4}));
  platforms = [
    {x:780,y:GROUND-110,w:130,h:24},{x:1550,y:GROUND-120,w:140,h:24},
    {x:2650,y:GROUND-115,w:130,h:24},{x:3500,y:GROUND-125,w:150,h:24},
    {x:4250,y:GROUND-110,w:130,h:24}
  ];
  checkpoints = [{x:1900,hit:false},{x:3700,hit:false}];
  boss = { x:5350, y:GROUND-130, w:130, h:130, hp:3, vx:0, vy:0, onGround:true, hurt:0, dir:-1, jumpT:2, dead:false, deadT:0, size:1 };
  particles = []; farts = [];
  clouds = Array.from({length:14},(_,i)=>({x:i*450+Math.random()*200, y:40+Math.random()*120, s:0.7+Math.random()*0.8}));
}

let respawnX = 80;
function showMsg(t, ms=1400) {
  msgEl.textContent = t; msgEl.style.opacity = 1;
  clearTimeout(msgTimer);
  msgTimer = setTimeout(()=>msgEl.style.opacity=0, ms);
}
function emit(x,y,n,colors,spread=6,up=8) {
  for (let i=0;i<n;i++) particles.push({
    x,y, vx:(Math.random()-0.5)*spread, vy:-Math.random()*up-2,
    c:colors[Math.random()*colors.length|0], r:3+Math.random()*5, life:1
  });
}

// ---------- rita Prince ----------
function drawPrince(px, py) {
  const p = player;
  ctx.save();
  ctx.translate(px+p.w/2, py+p.h);
  ctx.scale(p.face, 1);
  ctx.scale(1/Math.sqrt(p.squash), p.squash);
  if (invuln>0 && Math.floor(time*12)%2===0) ctx.globalAlpha = 0.4;
  const run = p.onGround && Math.abs(p.vx)>0.5 ? Math.sin(time*16)*8 : 0;
  // ben
  ctx.strokeStyle = '#3a6bd6'; ctx.lineWidth = 9; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-7,-26); ctx.lineTo(-9+run*0.6,-2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,-26); ctx.lineTo(9-run*0.6,-2); ctx.stroke();
  // skor
  ctx.fillStyle = '#e0342f';
  ctx.beginPath(); ctx.ellipse(-9+run*0.6,-2,8,5,0,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(9-run*0.6,-2,8,5,0,0,7); ctx.fill();
  // kropp (grön tröja med krona)
  ctx.fillStyle = '#3fbf5a';
  ctx.beginPath(); ctx.roundRect(-14,-48,28,26,8); ctx.fill();
  ctx.fillStyle = '#ffd83d'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  ctx.fillText('👑', 0, -30);
  // armar
  ctx.strokeStyle = '#3fbf5a'; ctx.lineWidth = 8;
  const arm = p.onGround ? run*0.5 : -10;
  ctx.beginPath(); ctx.moveTo(-13,-44); ctx.lineTo(-20-arm*0.3,-32+arm*0.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(13,-44); ctx.lineTo(20+arm*0.3,-32-arm*0.4); ctx.stroke();
  // huvud
  ctx.fillStyle = '#ffd9b3';
  ctx.beginPath(); ctx.arc(0,-60,15,0,7); ctx.fill();
  // blonda lockar!
  ctx.fillStyle = '#ffe066';
  const curls = [[-13,-70],[-6,-75],[2,-76],[10,-73],[15,-66],[-16,-63],[6,-78],[-2,-79]];
  curls.forEach(([cx,cy])=>{ ctx.beginPath(); ctx.arc(cx,cy,6.5,0,7); ctx.fill(); });
  // ansikte
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(5,-61,2.2,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(12,-61,2.2,0,7); ctx.fill();
  ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(8,-55,4,0.2,Math.PI-0.2); ctx.stroke();
  ctx.restore();
}

function drawBoss() {
  if (boss.dead && boss.deadT > 2.2) return;
  const bx = boss.x - cam, by = boss.y;
  ctx.save();
  ctx.translate(bx+boss.w/2, by+boss.h);
  let sz = boss.size;
  if (boss.hurt>0) sz *= 1 - Math.sin(boss.hurt*20)*0.08;
  if (boss.dead) sz *= Math.max(0, 1-boss.deadT/2);
  ctx.scale(sz, sz);
  const wob = Math.sin(time*4)*3;
  // stor bajs-emoji
  ctx.font = '130px serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('💩', 0, 10+wob*0.3);
  // arga ögonbryn
  ctx.strokeStyle = '#4a2c12'; ctx.lineWidth = 7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-42,-78+wob); ctx.lineTo(-16,-66+wob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(42,-78+wob); ctx.lineTo(16,-66+wob); ctx.stroke();
  ctx.restore();
  // hp-hjärtan
  if (!boss.dead) {
    ctx.font = '26px serif'; ctx.textAlign='center';
    for (let i=0;i<boss.hp;i++) ctx.fillText('💜', bx+boss.w/2-32+i*32, by-20);
    ctx.font = 'bold 18px Comic Sans MS, sans-serif'; ctx.fillStyle='#5a3a1a';
    ctx.fillText('BAJSMONSTRET', bx+boss.w/2, by-50);
  }
}

// ---------- uppdatering ----------
function respawn() {
  sOops();
  emit(player.x-cam+player.w/2, player.y+player.h/2, 14, ['#8a5a2b','#b07a3f','#fff']);
  const fun = ['Oj då! 💨','Usch! 😝','Hoppsan! Försök igen!','Nästan! Du klarar det! 💪'];
  showMsg(fun[Math.random()*fun.length|0]);
  player.x = respawnX; player.y = GROUND-200; player.vx=0; player.vy=0;
  invuln = 2;
}

function update(dt) {
  time += dt;
  if (invuln>0) invuln -= dt;
  const p = player;
  // rörelse
  const sp = 4.6;
  if (keys.l) { p.vx = -sp; p.face = -1; }
  else if (keys.r) { p.vx = sp; p.face = 1; }
  else p.vx *= 0.7;
  if (keys.j && p.onGround && !jumpHeld) { p.vy = -16; p.onGround = false; sJump(); p.squash = 1.25; }
  jumpHeld = keys.j;
  p.vy += 38*dt; if (p.vy>17) p.vy=17;
  p.x += p.vx; p.y += p.vy;
  if (p.x < 0) p.x = 0;
  p.squash += (1-p.squash)*0.15;

  // mark & plattformar
  p.onGround = false;
  if (p.y + p.h >= GROUND) { p.y = GROUND-p.h; if (p.vy>6) p.squash=0.75; p.vy=0; p.onGround=true; }
  platforms.forEach(pl=>{
    if (p.vy>=0 && p.x+p.w>pl.x+6 && p.x<pl.x+pl.w-6 &&
        p.y+p.h>=pl.y && p.y+p.h<=pl.y+22) {
      p.y = pl.y-p.h; p.vy=0; p.onGround=true;
    }
  });

  // stjärnor
  stars.forEach(s=>{
    s.t += dt*3;
    if (!s.got && Math.abs(p.x+p.w/2-s.x)<34 && Math.abs(p.y+p.h/2-(s.y+Math.sin(s.t)*8))<44) {
      s.got = true; score++; sStar();
      emit(s.x-cam, s.y, 10, ['#ffd83d','#fff','#ffb53d']);
      if (score%5===0) showMsg('Bra jobbat! ⭐ '+score, 1000);
    }
  });

  // checkpoints
  checkpoints.forEach(c=>{
    if (!c.hit && p.x > c.x) { c.hit = true; respawnX = c.x; showMsg('Checkpoint! 🚩',1000); sBoop(); }
  });

  // bajshögar
  if (invuln<=0) poops.forEach(o=>{
    if (p.x+p.w-8>o.x && p.x+8<o.x+o.w && p.y+p.h>o.y+8) respawn();
  });

  // skunkar
  skunks.forEach(s=>{
    if (s.dead) { s.deadT += dt; return; }
    s.x += s.dir * 1.4;
    if (s.x<s.min||s.x>s.max) s.dir*=-1;
    // PRUTT! Skunken pruttar mot Prince ibland
    const dist = Math.abs(p.x - s.x);
    if (dist < 650) {
      s.fartT -= dt;
      if (s.fartT <= 0) {
        s.fartT = 3.5 + Math.random()*3;
        const fdir = p.x < s.x ? -1 : 1;
        farts.push({ x: s.x + (fdir>0 ? s.w : -10), y: GROUND-26, w:30, h:24, dir:fdir, life:4, t:0 });
        emit(s.x-cam+s.w/2, s.y+s.h-6, 6, ['#a8e063','#c7f08a','#8fd14f'], 4, 4);
        if (dist < 550) sFart();
      }
    }
    const hitX = p.x+p.w-8>s.x && p.x+8<s.x+s.w;
    const stomp = hitX && p.vy>2 && p.y+p.h>s.y && p.y+p.h<s.y+26;
    if (stomp) {
      s.dead = true; p.vy = -10; sBoop(); score+=2;
      emit(s.x-cam+s.w/2, s.y, 12, ['#fff','#222','#aaa']);
      showMsg('Boing! 🦨💨', 900);
    } else if (invuln<=0 && hitX && p.y+p.h>s.y+10 && p.y<s.y+s.h) respawn();
  });

  // pruttmoln glider längs marken
  farts.forEach(f=>{
    f.x += f.dir * 2.6;
    f.t += dt; f.life -= dt;
    if (invuln<=0 && f.life>0 &&
        p.x+p.w-10>f.x && p.x+10<f.x+f.w &&
        p.y+p.h>GROUND-f.h-4) {
      f.life = 0;
      respawn();
      showMsg('Usch, en prutt! 💨🤢');
    }
  });
  farts = farts.filter(f=>f.life>0);

  // boss
  if (!boss.dead) {
    boss.jumpT -= dt;
    const near = p.x > boss.x-450;
    if (near) {
      boss.x += boss.dir*1.1;
      if (boss.x < 5150) boss.dir = 1;
      if (boss.x > 5470) boss.dir = -1;
      if (boss.jumpT<=0 && boss.onGround) { boss.vy=-9; boss.onGround=false; boss.jumpT=1.6+Math.random()*1.4; }
    }
    boss.vy += 30*dt; boss.y += boss.vy;
    if (boss.y+boss.h>=GROUND) { boss.y=GROUND-boss.h; boss.vy=0; boss.onGround=true; }
    if (boss.hurt>0) boss.hurt-=dt;
    const hb = { x:boss.x+15, w:boss.w-30 };
    const hitX = p.x+p.w-6>hb.x && p.x+6<hb.x+hb.w;
    const stomp = hitX && p.vy>2 && p.y+p.h>boss.y && p.y+p.h<boss.y+50;
    if (stomp && boss.hurt<=0) {
      boss.hp--; boss.hurt=0.8; boss.size*=0.85; p.vy=-12; sBoop();
      emit(boss.x-cam+boss.w/2, boss.y+30, 16, ['#8a5a2b','#b07a3f','#6b4423']);
      const t = ['SPLAT! 💥','Igen! 💪','En gång till!'];
      showMsg(boss.hp>0 ? t[3-boss.hp-1]||'SPLAT!' : '', 1000);
      if (boss.hp<=0) {
        boss.dead = true; state='winning'; sWin();
        showMsg('PFFFFT! 💨🚽', 1500);
      }
    } else if (invuln<=0 && !stomp && hitX && p.y+p.h>boss.y+40 && p.y<boss.y+boss.h && boss.hurt<=0) respawn();
  } else {
    boss.deadT += dt;
    if (boss.deadT<2) emit(boss.x-cam+boss.w/2, boss.y+boss.h/2, 2, ['#8a5a2b','#fff','#7ec8ff']);
    if (boss.deadT>2.5 && state==='winning') {
      state='won'; sWin();
      for (let i=0;i<5;i++) setTimeout(()=>{
        emit(200+Math.random()*500, 100+Math.random()*150, 25, ['#ff5a5a','#ffd83d','#3fbf5a','#5a8aff','#ff8ae0'], 10, 12);
      }, i*350);
    }
  }

  // partiklar
  particles.forEach(pa=>{ pa.x+=pa.vx; pa.y+=pa.vy; pa.vy+=0.35; pa.life-=dt*1.2; });
  particles = particles.filter(pa=>pa.life>0);

  // kamera
  cam += ((p.x - 280) - cam)*0.1;
  if (cam<0) cam=0;
  if (cam>LEVEL_END-W+100) cam=LEVEL_END-W+100;

  hud.textContent = '⭐ ' + score;
}

// ---------- rendering ----------
function draw() {
  // himmel
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#7ec8ff'); g.addColorStop(1,'#c8f0ff');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  // sol
  ctx.font='60px serif'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText('🌞', 790, 80);
  // moln
  ctx.font='50px serif';
  clouds.forEach(c=>{ const x=(c.x-cam*0.4)%(LEVEL_END); if(x>-80&&x<W+80) { ctx.save(); ctx.translate(x,c.y); ctx.scale(c.s,c.s); ctx.fillText('☁️',0,0); ctx.restore(); }});
  // kullar
  ctx.fillStyle = '#a8e063';
  for (let i=0;i<8;i++) {
    const hx = (i*900 - cam*0.6)%(LEVEL_END);
    ctx.beginPath(); ctx.arc(hx, GROUND+60, 160, Math.PI, 0); ctx.fill();
  }
  // mark
  ctx.fillStyle = '#5fc24e'; ctx.fillRect(0, GROUND, W, H-GROUND);
  ctx.fillStyle = '#8a5a2b'; ctx.fillRect(0, GROUND+22, W, H-GROUND);
  // blommor
  ctx.font='22px serif';
  for (let i=0;i<40;i++) {
    const fx = i*150 - cam; if (fx>-30&&fx<W+30) ctx.fillText(['🌸','🌼','🌷'][i%3], fx, GROUND+18);
  }
  // plattformar
  platforms.forEach(pl=>{
    const x = pl.x-cam; if (x<-200||x>W+200) return;
    ctx.fillStyle = '#c98a3e'; ctx.beginPath(); ctx.roundRect(x,pl.y,pl.w,pl.h,8); ctx.fill();
    ctx.fillStyle = '#5fc24e'; ctx.beginPath(); ctx.roundRect(x,pl.y,pl.w,10,6); ctx.fill();
  });
  // checkpoints
  ctx.font='42px serif';
  checkpoints.forEach(c=>{ const x=c.x-cam; if(x>-50&&x<W+50) ctx.fillText(c.hit?'🚩':'⚐', x, GROUND-6); });
  // stjärnor
  stars.forEach(s=>{
    if (s.got) return;
    const x = s.x-cam; if (x<-50||x>W+50) return;
    ctx.save(); ctx.translate(x, s.y+Math.sin(s.t)*8);
    ctx.font='34px serif'; ctx.textAlign='center'; ctx.fillText('⭐',0,12); ctx.restore();
  });
  // bajshögar
  ctx.font='44px serif'; ctx.textAlign='left';
  poops.forEach(o=>{ const x=o.x-cam; if(x>-60&&x<W+60) ctx.fillText('💩', x, o.y+o.h); });
  // pruttmoln
  farts.forEach(f=>{
    const x = f.x-cam; if (x<-60||x>W+60) return;
    ctx.save();
    ctx.globalAlpha = Math.min(1, f.life);
    // grön stinkig glöd
    ctx.fillStyle = 'rgba(168,224,99,0.4)';
    ctx.beginPath(); ctx.arc(x+f.w/2, GROUND-14, 18+Math.sin(f.t*10)*3, 0, 7); ctx.fill();
    ctx.font='34px serif'; ctx.textAlign='center';
    ctx.translate(x+f.w/2, GROUND-2+Math.sin(f.t*12)*2);
    ctx.scale(f.dir,1);
    ctx.fillText('💨', 0, 0);
    ctx.restore();
  });
  // skunkar
  skunks.forEach(s=>{
    const x = s.x-cam; if (x<-80||x>W+80) return;
    if (s.dead) {
      if (s.deadT<1) { ctx.save(); ctx.globalAlpha=1-s.deadT; ctx.font='40px serif'; ctx.fillText('💨', x, s.y+s.h-s.deadT*60); ctx.restore(); }
      return;
    }
    ctx.save(); ctx.translate(x+s.w/2, s.y+s.h);
    ctx.scale(-s.dir,1);
    ctx.font='46px serif'; ctx.textAlign='center';
    ctx.fillText('🦨', 0, Math.sin(time*10+s.x)*2);
    ctx.restore();
  });
  // boss + mål
  drawBoss();
  if (boss.dead && boss.deadT>1.5) {
    ctx.font='90px serif'; ctx.textAlign='center';
    ctx.fillText('🚽', boss.x-cam+boss.w/2, GROUND);
    if (boss.deadT<2.5) ctx.fillText('💨', boss.x-cam+boss.w/2, GROUND-80);
  }
  // Prince
  drawPrince(player.x-cam, player.y);
  // partiklar
  particles.forEach(pa=>{
    ctx.globalAlpha = Math.max(0,pa.life);
    ctx.fillStyle = pa.c;
    ctx.beginPath(); ctx.arc(pa.x, pa.y, pa.r, 0, 7); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // vinst-skärm
  if (state==='won') {
    ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.font='70px serif'; ctx.fillText('🎉👑🎉', W/2, 150);
    ctx.fillStyle='#ff5a2b'; ctx.font='bold 56px Comic Sans MS, sans-serif';
    ctx.fillText('PRINCE VANN!', W/2, 230);
    ctx.fillStyle='#2d5a8a'; ctx.font='bold 30px Comic Sans MS, sans-serif';
    ctx.fillText('Bajsmonstret spolades ner i toaletten! 🚽💨', W/2, 285);
    ctx.fillText('⭐ Du samlade ' + score + ' stjärnor!', W/2, 330);
    ctx.fillStyle='#3fbf5a'; ctx.font='bold 26px Comic Sans MS, sans-serif';
    ctx.fillText('Tryck HOPPA eller mellanslag för att spela igen!', W/2, 395);
    if (keys.j) { makeWorld(); respawnX=80; state='play'; }
  }
}

// ---------- loop ----------
let last = 0;
function loop(t) {
  const dt = Math.min((t-last)/1000, 0.033); last = t;
  if (state==='play'||state==='winning') update(dt);
  if (state==='won') { time+=dt; particles.forEach(pa=>{pa.x+=pa.vx;pa.y+=pa.vy;pa.vy+=0.3;pa.life-=dt;}); particles=particles.filter(pa=>pa.life>0); }
  draw();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', () => {
  overlay.classList.add('hidden');
  btnL.classList.remove('hidden'); btnR.classList.remove('hidden'); btnJ.classList.remove('hidden');
  makeWorld(); respawnX = 80; state = 'play';
  beep(523,0.15,'square',0.1);
});

state = 'menu';
makeWorld();
requestAnimationFrame(loop);
})();
</script>
